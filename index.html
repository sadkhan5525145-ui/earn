<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpinWin - Earn Points, Win Rewards!</title>
    <meta name="description" content="SpinWin - Spin the wheel, complete tasks, and win rewards!">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%236b7a5f' rx='20' width='100' height='100'/><text x='50' y='65' font-size='50' text-anchor='middle' fill='white' font-family='Arial' font-weight='bold'>S</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        olive: { 50: '#f4f5f0', 100: '#e8ebe3', 200: '#d1d7c7', 300: '#b3bda3', 400: '#95a47d', 500: '#7a8a5f', 600: '#6b7a5f', 700: '#5a6b4a', 800: '#4a5a3d', 900: '#3d4a32' },
                        accent: { orange: '#FF8C42' }
                    }
                }
            }
        }
    </script>
    <style>
        * { font-family: 'Inter', sans-serif; }
        .wheel-container { position: relative; width: 280px; height: 280px; }
        @media (min-width: 400px) { .wheel-container { width: 320px; height: 320px; } }
        .wheel { width: 100%; height: 100%; border-radius: 50%; position: relative; overflow: hidden; box-shadow: 0 8px 32px rgba(107, 122, 95, 0.3); transition: transform 4s cubic-bezier(0.17, 0.67, 0.12, 0.99); }
        .wheel-segment { position: absolute; width: 50%; height: 50%; transform-origin: 100% 100%; clip-path: polygon(0 0, 100% 0, 100% 100%); }
        .wheel-segment span { position: absolute; font-weight: 700; font-size: 11px; color: white; text-shadow: 1px 1px 2px rgba(0,0,0,0.4); transform: rotate(22.5deg) translateY(-48px); }
        @media (min-width: 400px) { .wheel-segment span { font-size: 12px; transform: rotate(22.5deg) translateY(-55px); } }
        .wheel-pointer { position: absolute; top: -10px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 16px solid transparent; border-right: 16px solid transparent; border-top: 30px solid #FF8C42; z-index: 10; filter: drop-shadow(0 3px 4px rgba(0,0,0,0.25)); }
        .wheel-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 60px; height: 60px; background: linear-gradient(135deg, #FF8C42, #E67A35); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; color: white; font-size: 14px; box-shadow: 0 4px 12px rgba(255, 140, 66, 0.4); z-index: 5; cursor: pointer; }
        .wheel-center:hover { transform: translate(-50%, -50%) scale(1.08); }
        .confetti { position: fixed; width: 10px; height: 10px; pointer-events: none; animation: confetti-fall 3s linear forwards; }
        @keyframes confetti-fall { 0% { transform: translateY(-100vh) rotate(0deg); opacity: 1; } 100% { transform: translateY(100vh) rotate(720deg); opacity: 0; } }
        .slide-up { animation: slideUp 0.25s ease-out; }
        @keyframes slideUp { from { transform: translateY(15px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .online-dot { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #95a47d; border-radius: 3px; }
        .loader { border: 3px solid #e8ebe3; border-top: 3px solid #6b7a5f; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-olive-50 min-h-screen">
    <div id="app" class="min-h-screen flex items-center justify-center">
        <div class="text-center">
            <div class="loader mx-auto mb-4"></div>
            <p class="text-olive-600">Loading SpinWin...</p>
        </div>
    </div>
    <div id="toast" class="fixed top-16 right-3 z-50 flex flex-col gap-2 max-w-xs"></div>
    <div id="modal" class="fixed inset-0 z-50 hidden">
        <div class="absolute inset-0 bg-black/40" onclick="closeModal()"></div>
        <div id="modalContent" class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 bg-white rounded-2xl shadow-xl max-w-md w-[90%] max-h-[85vh] overflow-y-auto"></div>
    </div>

    <script>
        // ===================== CONSTANTS =====================
        const ADMIN_EMAIL = 'saadking3132@gmail.com';
        const ADMIN_PASS = 'admin123';
        const ADMIN_NAME = 'Saad King (Admin)';
        const ADMIN_ID = 'admin_master_001';

        const PRIZES = [
            { label: '10', val: 10, color: '#84cc16', chance: 25 },
            { label: '25', val: 25, color: '#22c55e', chance: 20 },
            { label: '50', val: 50, color: '#3b82f6', chance: 15 },
            { label: '100', val: 100, color: '#8b5cf6', chance: 10 },
            { label: '200', val: 200, color: '#ec4899', chance: 7 },
            { label: '500', val: 500, color: '#f59e0b', chance: 5 },
            { label: '1K', val: 1000, color: '#ef4444', chance: 3 },
            { label: 'JP', val: 'jackpot', color: '#fbbf24', chance: 1 }
        ];

        // ===================== STATE =====================
        let currentUserId = null;
        let currentUserData = null;
        let view = 'home';
        let spinning = false;

        // ===================== LOCAL STORAGE DATABASE =====================
        function getDB() {
            const data = localStorage.getItem('spinwin_db');
            if (data) return JSON.parse(data);
            return initDB();
        }

        function saveDB(db) {
            localStorage.setItem('spinwin_db', JSON.stringify(db));
            // Broadcast to other tabs
            if (window.BroadcastChannel) {
                const bc = new BroadcastChannel('spinwin_sync');
                bc.postMessage({ type: 'db_update' });
            }
        }

        function initDB() {
            const db = {
                users: {},
                global: {
                    jackpot: { amt: 10000, players: 0 },
                    tasks: getDefaultTasks(),
                    announcements: [],
                    stats: { totalUsers: 0, totalSpins: 0, totalEarned: 0 }
                }
            };
            // Create admin account
            db.users[ADMIN_ID] = createAdminData();
            saveDB(db);
            return db;
        }

        function getDefaultTasks() {
            return [
                { id: 1, title: 'Daily Login', desc: 'Login to SpinWin daily', pts: 10, icon: '👋', active: true },
                { id: 2, title: 'Watch Video Ad', desc: 'Watch a short video', pts: 25, icon: '📺', active: true },
                { id: 3, title: 'Complete Survey', desc: 'Answer a quick survey', pts: 50, icon: '📝', active: true },
                { id: 4, title: 'Invite Friend', desc: 'Refer a friend', pts: 100, icon: '👥', active: true },
                { id: 5, title: 'Social Share', desc: 'Share on social media', pts: 30, icon: '🔗', active: true },
                { id: 6, title: 'Complete 10 Spins', desc: 'Spin 10 times', pts: 75, icon: '🎰', active: true },
                { id: 7, title: 'Download App', desc: 'Download partner app', pts: 200, icon: '📱', active: true },
                { id: 8, title: 'Verify Email', desc: 'Verify your email', pts: 150, icon: '✉️', active: true },
            ];
        }

        function createUserData(email, name, referredBy = null) {
            const now = Date.now();
            return {
                email: email.toLowerCase(),
                name: name,
                phone: '',
                pts: 100,
                totalEarned: 100,
                spins: 0,
                spinsToday: 0,
                lastSpinReset: new Date().toDateString(),
                level: 1,
                refCode: 'SPIN' + Math.random().toString(36).substr(2, 6).toUpperCase(),
                referredBy: referredBy,
                refs: [],
                txns: [{ id: 't_' + now, type: 'earn', amt: 100, desc: '🎁 Welcome bonus!', time: new Date().toISOString() }],
                wds: [],
                taskProgress: {},
                stats: { bigWin: 0, jpWins: 0 },
                created: new Date().toISOString(),
                lastLogin: new Date().toISOString(),
                online: true
            };
        }

        function createAdminData() {
            return {
                email: ADMIN_EMAIL,
                name: ADMIN_NAME,
                phone: '+92 300 1234567',
                pts: 999999,
                totalEarned: 999999,
                spins: 500,
                spinsToday: 0,
                lastSpinReset: new Date().toDateString(),
                level: 100,
                refCode: 'SPINADMIN',
                referredBy: null,
                refs: [],
                txns: [],
                wds: [],
                taskProgress: {},
                stats: { bigWin: 10000, jpWins: 5 },
                isAdmin: true,
                created: new Date().toISOString(),
                lastLogin: new Date().toISOString(),
                online: true
            };
        }

        // ===================== HELPERS =====================
        const $ = id => document.getElementById(id);
        const fmtNum = n => n >= 1000000 ? (n/1000000).toFixed(1)+'M' : n >= 1000 ? (n/1000).toFixed(1)+'K' : (n||0).toLocaleString();
        const fmtDate = d => { if(!d) return ''; const date = new Date(d), now = new Date(), diff = now - date; if(diff < 60000) return 'Just now'; if(diff < 3600000) return Math.floor(diff/60000)+'m ago'; if(diff < 86400000) return Math.floor(diff/3600000)+'h ago'; return date.toLocaleDateString('en-PK', {month:'short', day:'numeric'}); };
        
        function toast(msg, type = 'info') {
            const t = $('toast'), el = document.createElement('div');
            const bg = type === 'success' ? 'bg-green-500' : type === 'error' ? 'bg-red-500' : 'bg-olive-600';
            el.className = `${bg} text-white px-3 py-2 rounded-lg shadow slide-up flex items-center gap-2 text-sm`;
            el.innerHTML = `<span>${type === 'success' ? '✓' : type === 'error' ? '✕' : 'ℹ'}</span><span>${msg}</span>`;
            t.appendChild(el);
            setTimeout(() => { el.style.opacity = '0'; el.style.transform = 'translateX(100%)'; el.style.transition = 'all 0.3s'; setTimeout(() => el.remove(), 300); }, 3000);
        }
        
        function closeModal() { $('modal').classList.add('hidden'); }
        
        function openModal(content) { $('modalContent').innerHTML = content; $('modal').classList.remove('hidden'); }
        
        function confetti() {
            const colors = ['#84cc16', '#FF8C42', '#3b82f6', '#8b5cf6', '#ec4899', '#f59e0b'];
            for (let i = 0; i < 50; i++) {
                const c = document.createElement('div');
                c.className = 'confetti';
                c.style.left = Math.random() * 100 + 'vw';
                c.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                c.style.animationDelay = Math.random() * 2 + 's';
                c.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
                document.body.appendChild(c);
                setTimeout(() => c.remove(), 5000);
            }
        }

        function updateUser(updates) {
            if (!currentUserId) return;
            const db = getDB();
            if (db.users[currentUserId]) {
                db.users[currentUserId] = { ...db.users[currentUserId], ...updates };
                saveDB(db);
                currentUserData = db.users[currentUserId];
            }
        }

        function checkDailyReset() {
            if (!currentUserData) return;
            const today = new Date().toDateString();
            if (currentUserData.lastSpinReset !== today) {
                updateUser({ spinsToday: 0, lastSpinReset: today, taskProgress: {} });
            }
        }

        // ===================== AUTH =====================
        function login(email, password) {
            email = email.toLowerCase().trim();
            const db = getDB();
            
            // Check admin login
            if (email === ADMIN_EMAIL && password === ADMIN_PASS) {
                // Ensure admin exists
                if (!db.users[ADMIN_ID]) {
                    db.users[ADMIN_ID] = createAdminData();
                }
                db.users[ADMIN_ID].online = true;
                db.users[ADMIN_ID].lastLogin = new Date().toISOString();
                saveDB(db);
                
                currentUserId = ADMIN_ID;
                currentUserData = db.users[ADMIN_ID];
                checkDailyReset();
                
                toast('Welcome Admin! 👑', 'success');
                render();
                return true;
            }
            
            // Find user by email
            let userId = null;
            let userData = null;
            
            for (const [id, user] of Object.entries(db.users)) {
                if (user.email === email) {
                    userId = id;
                    userData = user;
                    break;
                }
            }
            
            if (!userId) {
                toast('User not found. Please sign up.', 'error');
                return false;
            }
            
            // Check password
            if (userData.pass && userData.pass !== password) {
                toast('Invalid password', 'error');
                return false;
            }
            
            db.users[userId].online = true;
            db.users[userId].lastLogin = new Date().toISOString();
            saveDB(db);
            
            currentUserId = userId;
            currentUserData = db.users[userId];
            checkDailyReset();
            
            toast(`Welcome back, ${userData.name}!`, 'success');
            render();
            return true;
        }

        function signup(name, email, password, refCode) {
            email = email.toLowerCase().trim();
            const db = getDB();
            
            // Check if email exists
            for (const user of Object.values(db.users)) {
                if (user.email === email) {
                    toast('Email already registered. Please login.', 'error');
                    return false;
                }
            }
            
            const userId = 'user_' + Date.now();
            const userData = createUserData(email, name, refCode || null);
            userData.pass = password;
            
            // Handle referral
            if (refCode) {
                for (const [refId, refUser] of Object.entries(db.users)) {
                    if (refUser.refCode === refCode.toUpperCase()) {
                        // Give referrer bonus
                        db.users[refId].refs = [...(refUser.refs || []), userId];
                        db.users[refId].pts = (refUser.pts || 0) + 100;
                        db.users[refId].totalEarned = (refUser.totalEarned || 0) + 100;
                        db.users[refId].txns = [...(refUser.txns || []), { id: 't_' + Date.now(), type: 'earn', amt: 100, desc: `👥 Referral: ${name}`, time: new Date().toISOString() }].slice(-50);
                        
                        // Give new user bonus
                        userData.pts += 50;
                        userData.totalEarned += 50;
                        userData.txns.push({ id: 't_' + Date.now() + '_ref', type: 'earn', amt: 50, desc: '🎁 Referral bonus!', time: new Date().toISOString() });
                        userData.referredBy = refCode;
                        
                        toast('Referral bonus! +50 pts', 'success');
                        break;
                    }
                }
            }
            
            db.users[userId] = userData;
            db.global.stats.totalUsers = (db.global.stats.totalUsers || 0) + 1;
            saveDB(db);
            
            currentUserId = userId;
            currentUserData = userData;
            
            toast('Account created! 🎉', 'success');
            render();
            return true;
        }

        function logout() {
            const db = getDB();
            if (currentUserId && db.users[currentUserId]) {
                db.users[currentUserId].online = false;
                saveDB(db);
            }
            
            currentUserId = null;
            currentUserData = null;
            view = 'home';
            
            render();
            toast('Logged out', 'success');
        }

        // ===================== RENDER =====================
        function render() {
            const app = $('app');
            if (!currentUserId || !currentUserData) {
                app.innerHTML = renderAuth();
            } else {
                app.innerHTML = renderMain();
            }
        }

        function renderAuth() {
            return `
            <div class="min-h-screen bg-gradient-to-br from-olive-600 to-olive-800 flex items-center justify-center p-4">
                <div class="w-full max-w-md">
                    <div class="text-center mb-6">
                        <div class="w-20 h-20 bg-white rounded-2xl flex items-center justify-center mx-auto mb-3 shadow-lg">
                            <span class="text-4xl">🎰</span>
                        </div>
                        <h1 class="text-3xl font-bold text-white">SpinWin</h1>
                        <p class="text-olive-200 mt-1">Spin. Earn. Withdraw!</p>
                    </div>
                    
                    <div class="bg-white rounded-2xl shadow-xl p-5">
                        <div class="flex mb-4 bg-olive-100 rounded-lg p-1">
                            <button onclick="showAuthTab('login')" id="loginTab" class="flex-1 py-2 px-3 rounded-md text-sm font-medium bg-white text-olive-800 shadow">Login</button>
                            <button onclick="showAuthTab('signup')" id="signupTab" class="flex-1 py-2 px-3 rounded-md text-sm font-medium text-olive-600">Sign Up</button>
                        </div>
                        
                        <form id="loginForm" onsubmit="handleLogin(event)" class="space-y-3">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                                <input type="email" id="loginEmail" required class="w-full p-3 border border-gray-200 rounded-lg focus:ring-2 focus:ring-olive-500 focus:outline-none" placeholder="your@email.com">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                                <input type="password" id="loginPass" required class="w-full p-3 border border-gray-200 rounded-lg focus:ring-2 focus:ring-olive-500 focus:outline-none" placeholder="••••••••">
                            </div>
                            <button type="submit" class="w-full bg-olive-600 hover:bg-olive-700 text-white font-semibold py-3 rounded-lg transition">Login</button>
                            <p class="text-xs text-gray-500 text-center">Admin: ${ADMIN_EMAIL} / ${ADMIN_PASS}</p>
                        </form>
                        
                        <form id="signupForm" onsubmit="handleSignup(event)" class="space-y-3 hidden">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Name</label>
                                <input type="text" id="regName" required class="w-full p-3 border border-gray-200 rounded-lg focus:ring-2 focus:ring-olive-500 focus:outline-none" placeholder="Your Name">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                                <input type="email" id="regEmail" required class="w-full p-3 border border-gray-200 rounded-lg focus:ring-2 focus:ring-olive-500 focus:outline-none" placeholder="your@email.com">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                                <input type="password" id="regPass" required minlength="6" class="w-full p-3 border border-gray-200 rounded-lg focus:ring-2 focus:ring-olive-500 focus:outline-none" placeholder="Min 6 characters">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Referral Code (Optional)</label>
                                <input type="text" id="regRef" class="w-full p-3 border border-gray-200 rounded-lg focus:ring-2 focus:ring-olive-500 focus:outline-none" placeholder="SPINXXXXXX">
                            </div>
                            <button type="submit" class="w-full bg-accent-orange hover:bg-orange-600 text-white font-semibold py-3 rounded-lg transition">Create Account</button>
                        </form>
                    </div>
                </div>
            </div>`;
        }

        function showAuthTab(tab) {
            const lf = $('loginForm'), sf = $('signupForm');
            const lt = $('loginTab'), st = $('signupTab');
            if (tab === 'login') {
                lf.classList.remove('hidden'); sf.classList.add('hidden');
                lt.classList.add('bg-white', 'text-olive-800', 'shadow'); lt.classList.remove('text-olive-600');
                st.classList.remove('bg-white', 'text-olive-800', 'shadow'); st.classList.add('text-olive-600');
            } else {
                lf.classList.add('hidden'); sf.classList.remove('hidden');
                st.classList.add('bg-white', 'text-olive-800', 'shadow'); st.classList.remove('text-olive-600');
                lt.classList.remove('bg-white', 'text-olive-800', 'shadow'); lt.classList.add('text-olive-600');
            }
        }

        function handleLogin(e) {
            e.preventDefault();
            const email = $('loginEmail').value;
            const pass = $('loginPass').value;
            login(email, pass);
        }

        function handleSignup(e) {
            e.preventDefault();
            const name = $('regName').value;
            const email = $('regEmail').value;
            const pass = $('regPass').value;
            const ref = $('regRef').value;
            signup(name, email, pass, ref);
        }

        function renderMain() {
            const db = getDB();
            const onlineUsers = Object.values(db.users).filter(u => u.online).length;
            
            return `
            <div class="min-h-screen flex flex-col bg-olive-50">
                <!-- Header -->
                <header class="bg-olive-600 text-white px-4 py-3 sticky top-0 z-40 shadow">
                    <div class="max-w-lg mx-auto flex items-center justify-between">
                        <div class="flex items-center gap-2">
                            <span class="text-2xl">🎰</span>
                            <div>
                                <h1 class="text-lg font-bold">SpinWin</h1>
                                <p class="text-xs text-olive-200">Level ${currentUserData.level || 1} • ${currentUserData.name}</p>
                            </div>
                        </div>
                        <div class="flex items-center gap-2">
                            <div class="flex items-center gap-1 bg-olive-700/50 px-2 py-1 rounded-full">
                                <span class="w-2 h-2 rounded-full bg-green-400 online-dot"></span>
                                <span class="text-xs">${onlineUsers} online</span>
                            </div>
                            <div class="flex items-center gap-1 bg-olive-700/50 px-3 py-1.5 rounded-full">
                                <span class="text-sm">💰</span>
                                <span class="font-bold text-sm">${fmtNum(currentUserData.pts)}</span>
                            </div>
                            <button onclick="logout()" class="p-2 rounded-full bg-olive-700/50 hover:bg-red-500/80 transition" title="Logout">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
                            </button>
                        </div>
                    </div>
                </header>
                
                <main class="flex-1 p-4 pb-20 overflow-y-auto">
                    <div class="max-w-lg mx-auto slide-up">${renderView()}</div>
                </main>
                
                <nav class="bg-white border-t border-olive-200 fixed bottom-0 left-0 right-0 z-40">
                    <div class="max-w-lg mx-auto flex justify-around py-2">
                        <button onclick="goView('home')" class="nav-btn flex flex-col items-center py-1 px-3 ${view === 'home' ? 'text-accent-orange' : 'text-olive-500'}">
                            <span class="text-xl">🏠</span><span class="text-xs mt-0.5">Home</span>
                        </button>
                        <button onclick="goView('spin')" class="nav-btn flex flex-col items-center py-1 px-3 ${view === 'spin' ? 'text-accent-orange' : 'text-olive-500'}">
                            <span class="text-xl">🎰</span><span class="text-xs mt-0.5">Spin</span>
                        </button>
                        <button onclick="goView('tasks')" class="nav-btn flex flex-col items-center py-1 px-3 ${view === 'tasks' ? 'text-accent-orange' : 'text-olive-500'}">
                            <span class="text-xl">📋</span><span class="text-xs mt-0.5">Tasks</span>
                        </button>
                        <button onclick="goView('wallet')" class="nav-btn flex flex-col items-center py-1 px-3 ${view === 'wallet' ? 'text-accent-orange' : 'text-olive-500'}">
                            <span class="text-xl">💳</span><span class="text-xs mt-0.5">Withdraw</span>
                        </button>
                        <button onclick="goView('profile')" class="nav-btn flex flex-col items-center py-1 px-3 relative ${view === 'profile' ? 'text-accent-orange' : 'text-olive-500'}">
                            <span class="text-xl">👤</span><span class="text-xs mt-0.5">Profile</span>

        function spinWheel() {
            if (spinning) return;
            if ((currentUserData.spinsToday || 0) >= 10) { toast('No spins left today!', 'error'); return; }
            if (currentUserData.pts < 10) { toast('Need 10 points!', 'error'); return; }
            
            spinning = true;
            
            // Determine prize
            const rand = Math.random() * 100;
            let cum = 0, prize = PRIZES[0];
            for (const p of PRIZES) { cum += p.chance; if (rand <= cum) { prize = p; break; } }
            
            // Rotation
            const segAngle = 45, idx = PRIZES.indexOf(prize);
            const targetRot = 360 - (idx * segAngle + segAngle / 2);
            const totalRot = 360 * 5 + targetRot;
            $('wheel').style.transform = `rotate(${totalRot}deg)`;
            
            // Update immediately
            updateUser({ pts: currentUserData.pts - 10, spins: (currentUserData.spins || 0) + 1, spinsToday: (currentUserData.spinsToday || 0) + 1 });
            
            const db = getDB();
            db.global.stats.totalSpins = (db.global.stats.totalSpins || 0) + 1;
            saveDB(db);
            
            setTimeout(() => {
                spinning = false;
                
                let prizeVal = prize.val;
                let desc = `🎰 Spin: ${prize.label} pts`;
                
                if (prize.val === 'jackpot') {
                    prizeVal = db.global.jackpot?.amt || 10000;
                    desc = `🎉 JACKPOT! ${fmtNum(prizeVal)} pts!`;
                    confetti();
                    
                    // Reset jackpot
                    db.global.jackpot = { amt: 5000 + Math.floor(Math.random() * 5000), players: 0 };
                    saveDB(db);
                }
                
                const txns = [...(currentUserData.txns || []), { id: 't_' + Date.now(), type: 'earn', amt: prizeVal, desc, time: new Date().toISOString() }];
                
                const updates = {
                    pts: currentUserData.pts - 10 + prizeVal,
                    totalEarned: (currentUserData.totalEarned || 0) + prizeVal,
                    txns: txns.slice(-50)
                };
                
                if (prizeVal >= 500) {
                    updates.stats = { ...(currentUserData.stats || {}), bigWin: Math.max((currentUserData.stats?.bigWin || 0), prizeVal) };
                }
                if (prize.val === 'jackpot') {
                    updates.stats = { ...(currentUserData.stats || {}), jpWins: (currentUserData.stats?.jpWins || 0) + 1 };
                }
                
                updateUser(updates);
                toast(desc, 'success');
                render();
            }, 4500);
        }

                <div class="bg-white rounded-xl p-4 text-center shadow-sm border border-olive-100">
                    <p class="text-2xl font-bold text-olive-700">${fmtNum(db.global.jackpot?.amt || 0)}</p>
                    <p class="text-xs text-gray-500">Jackpot</p>
                </div>
            </div>
            
            <div class="space-y-3">
                <button onclick="showAdminUsers()" class="w-full bg-white border border-olive-200 text-olive-700 font-medium py-3 rounded-lg flex items-center justify-center gap-2 hover:bg-olive-50">
                    <span>👥</span> Manage Users
                </button>
                
                <button onclick="showAdminTasks()" class="w-full bg-white border border-olive-200 text-olive-700 font-medium py-3 rounded-lg flex items-center justify-center gap-2 hover:bg-olive-50">
                    <span>📋</span> Manage Tasks
                </button>
                
                <button onclick="showAdminWithdrawals()" class="w-full bg-white border border-olive-200 text-olive-700 font-medium py-3 rounded-lg flex items-center justify-center gap-2 hover:bg-olive-50">
                    <span>💳</span> Withdrawals
                </button>
                
                <button onclick="showAdminAnnounce()" class="w-full bg-white border border-olive-200 text-olive-700 font-medium py-3 rounded-lg flex items-center justify-center gap-2 hover:bg-olive-50">
                    <span>📢</span> Announcements
                </button>
                
                <button onclick="goView('profile')" class="w-full bg-gray-100 text-gray-700 font-medium py-3 rounded-lg flex items-center justify-center gap-2 hover:bg-gray-200">
                    <span>←</span> Back to Profile
                </button>
            </div>`;
        }

        function showAdminUsers() {
            const db = getDB();
            const users = Object.entries(db.users).filter(([id]) => id !== ADMIN_ID);
            
            openModal(`
                <div class="p-5">
                    <h3 class="text-lg font-bold text-olive-700 mb-4">👥 Manage Users (${users.length})</h3>
                    <div class="space-y-2 max-h-80 overflow-y-auto">
                        ${users.map(([id, u]) => `
                            <div class="bg-olive-50 rounded-lg p-3">
                                <div class="flex items-center justify-between">
                                    <div>
                                        <p class="font-medium text-olive-700">${u.name}</p>
                                        <p class="text-xs text-gray-500">${u.email}</p>
                                        <p class="text-xs text-gray-400">Points: ${fmtNum(u.pts)} • Refs: ${(u.refs || []).length}</p>
                                    </div>
                                    <div class="flex items-center gap-1">
                                        <span class="w-2 h-2 rounded-full ${u.online ? 'bg-green-400' : 'bg-gray-300'}"></span>
                                        <button onclick="editUserPts('${id}')" class="px-2 py-1 bg-olive-600 text-white text-xs rounded">Edit</button>
                                        <button onclick="banUser('${id}')" class="px-2 py-1 bg-red-500 text-white text-xs rounded">Ban</button>
                                    </div>
                                </div>
                            </div>
                        `).join('') || '<p class="text-center text-gray-500">No users yet</p>'}
                    </div>
                    <button onclick="closeModal()" class="w-full mt-4 bg-gray-100 text-gray-700 py-2 rounded-lg">Close</button>
                </div>
            `);
        }

        function editUserPts(userId) {
            const db = getDB();
            const user = db.users[userId];
            if (!user) return;
            
            openModal(`
                <div class="p-5">
                    <h3 class="text-lg font-bold text-olive-700 mb-4">Edit User: ${user.name}</h3>
                    <div class="space-y-3">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Points</label>
                            <input type="number" id="userPts" value="${user.pts}" class="w-full p-3 border border-gray-200 rounded-lg focus:ring-2 focus:ring-olive-500 focus:outline-none">
                        </div>
                        <button onclick="saveUserPts('${userId}')" class="w-full bg-olive-600 text-white font-semibold py-3 rounded-lg">Save</button>
                    </div>
                </div>
            `);
        }

        function saveUserPts(userId) {
            const pts = parseInt($('userPts').value) || 0;
            const db = getDB();
            if (db.users[userId]) {
                db.users[userId].pts = pts;
                saveDB(db);
                toast('User points updated!', 'success');
                closeModal();
                showAdminUsers();
            }
        }

        function banUser(userId) {
            if (!confirm('Are you sure you want to ban this user?')) return;
            const db = getDB();
            delete db.users[userId];
            saveDB(db);
            toast('User banned!', 'success');
            closeModal();
            showAdminUsers();
        }

        function showAdminTasks() {
            const db = getDB();
            const tasks = db.global.tasks || getDefaultTasks();
            
            openModal(`
                <div class="p-5">
                    <h3 class="text-lg font-bold text-olive-700 mb-4">📋 Manage Tasks</h3>
                    <div class="space-y-2 max-h-60 overflow-y-auto mb-4">
                        ${tasks.map(t => `
                            <div class="bg-olive-50 rounded-lg p-3 flex items-center justify-between">
                                <div>
                                    <p class="font-medium">${t.icon} ${t.title}</p>
                                    <p class="text-xs text-gray-500">+${t.pts} pts</p>
                                </div>
                                <div class="flex items-center gap-2">
                                    <button onclick="toggleTask(${t.id})" class="px-2 py-1 ${t.active ? 'bg-green-500' : 'bg-gray-400'} text-white text-xs rounded">${t.active ? 'ON' : 'OFF'}</button>
                                    <button onclick="deleteTask(${t.id})" class="px-2 py-1 bg-red-500 text-white text-xs rounded">✕</button>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                    
                    <div class="border-t pt-4">
                        <p class="font-medium text-olive-700 mb-2">Add New Task</p>
                        <div class="space-y-2">
                            <input type="text" id="newTaskTitle" placeholder="Task title" class="w-full p-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-olive-500">
                            <input type="text" id="newTaskDesc" placeholder="Description" class="w-full p-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-olive-500">
                            <input type="number" id="newTaskPts" placeholder="Points" class="w-full p-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-olive-500">
                            <input type="text" id="newTaskIcon" placeholder="Icon (emoji)" class="w-full p-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-olive-500">
                            <button onclick="addTask()" class="w-full bg-accent-orange text-white py-2 rounded-lg text-sm">Add Task</button>
                        </div>
                    </div>
                    <button onclick="closeModal()" class="w-full mt-4 bg-gray-100 text-gray-700 py-2 rounded-lg">Close</button>
                </div>
            `);
        }

        function toggleTask(taskId) {
            const db = getDB();
            const task = db.global.tasks.find(t => t.id === taskId);
            if (task) {
                task.active = !task.active;
                saveDB(db);
                toast('Task updated!', 'success');
                showAdminTasks();
            }
        }

        function deleteTask(taskId) {
            if (!confirm('Delete this task?')) return;
            const db = getDB();
            db.global.tasks = db.global.tasks.filter(t => t.id !== taskId);
            saveDB(db);
            toast('Task deleted!', 'success');
            showAdminTasks();
        }

        function addTask() {
            const title = $('newTaskTitle').value.trim();
            const desc = $('newTaskDesc').value.trim();
            const pts = parseInt($('newTaskPts').value) || 10;
            const icon = $('newTaskIcon').value.trim() || '📋';
            
            if (!title) { toast('Title required', 'error'); return; }
            
            const db = getDB();
            const newId = Math.max(...db.global.tasks.map(t => t.id), 0) + 1;
            db.global.tasks.push({ id: newId, title, desc, pts, icon, active: true });
            saveDB(db);
            toast('Task added!', 'success');
            showAdminTasks();
        }

        function showAdminWithdrawals() {
            const db = getDB();
            const allWds = [];
            
            for (const [userId, user] of Object.entries(db.users)) {
                for (const wd of (user.wds || [])) {
                    allWds.push({ ...wd, userId, userName: user.name, userEmail: user.email });
                }
            }
            
            const pending = allWds.filter(w => w.status === 'pending');
            const processed = allWds.filter(w => w.status !== 'pending').slice(-10);
            
            openModal(`
                <div class="p-5">
                    <h3 class="text-lg font-bold text-olive-700 mb-4">💳 Withdrawal Requests</h3>
                    
                    <p class="font-medium text-amber-600 mb-2">Pending (${pending.length})</p>
                    <div class="space-y-2 max-h-40 overflow-y-auto mb-4">
                        ${pending.map(w => `
                            <div class="bg-amber-50 border border-amber-200 rounded-lg p-3">
                                <div class="flex items-center justify-between mb-2">
                                    <div>
                                        <p class="font-medium">${w.userName}</p>
                                        <p class="text-xs text-gray-500">${w.userEmail}</p>
                                    </div>
                                    <p class="font-bold text-accent-orange">${fmtNum(w.amt)} pts</p>
                                </div>
                                <p class="text-xs text-gray-500">${w.method} • ${w.acc}</p>
                                <div class="flex gap-2 mt-2">
                                    <button onclick="approveWd('${w.userId}', '${w.id}')" class="flex-1 bg-green-500 text-white py-1 rounded text-sm">Approve</button>
                                    <button onclick="rejectWd('${w.userId}', '${w.id}')" class="flex-1 bg-red-500 text-white py-1 rounded text-sm">Reject</button>
                                </div>
                            </div>
                        `).join('') || '<p class="text-center text-gray-500">No pending withdrawals</p>'}
                    </div>
                    
                    <p class="font-medium text-gray-600 mb-2">Recent Processed</p>
                    <div class="space-y-2 max-h-40 overflow-y-auto">
                        ${processed.map(w => `
                            <div class="bg-gray-50 rounded-lg p-2 text-sm">
                                <div class="flex items-center justify-between">
                                    <p>${w.userName} - ${fmtNum(w.amt)} pts</p>
                                    <span class="px-2 py-0.5 rounded text-xs ${w.status === 'approved' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}">${w.status}</span>
                                </div>
                            </div>
                        `).join('') || '<p class="text-center text-gray-500">No processed withdrawals</p>'}
                    </div>
                    <button onclick="closeModal()" class="w-full mt-4 bg-gray-100 text-gray-700 py-2 rounded-lg">Close</button>
                </div>
            `);
        }

        function approveWd(userId, wdId) {
            const db = getDB();
            const user = db.users[userId];
            if (!user) return;
            
            const wd = user.wds.find(w => w.id === wdId);
            if (wd) {
                wd.status = 'approved';
                saveDB(db);
                toast('Withdrawal approved!', 'success');
                showAdminWithdrawals();
            }
        }

        function rejectWd(userId, wdId) {
            const db = getDB();
            const user = db.users[userId];
            if (!user) return;
            
            const wd = user.wds.find(w => w.id === wdId);
            if (wd) {
                wd.status = 'rejected';
                // Refund points
                user.pts = (user.pts || 0) + wd.amt;
                saveDB(db);
                toast('Withdrawal rejected & refunded', 'success');
                showAdminWithdrawals();
            }
        }

        function showAdminAnnounce() {
            const db = getDB();
            const announcements = db.global.announcements || [];
            
            openModal(`
                <div class="p-5">
                    <h3 class="text-lg font-bold text-olive-700 mb-4">📢 Announcements</h3>
                    
                    <div class="space-y-2 mb-4">
                        <input type="text" id="annTitle" placeholder="Title" class="w-full p-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-olive-500">
                        <textarea id="annBody" placeholder="Message" class="w-full p-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-olive-500" rows="3"></textarea>
                        <button onclick="sendAnnouncement()" class="w-full bg-accent-orange text-white py-2 rounded-lg text-sm">Send to All Users</button>
                    </div>
                    
                    <p class="font-medium text-gray-600 mb-2">Recent Announcements</p>
                    <div class="space-y-2 max-h-40 overflow-y-auto">
                        ${announcements.slice(-5).reverse().map(a => `
                            <div class="bg-olive-50 rounded-lg p-2 text-sm">
                                <p class="font-medium">${a.title}</p>
                                <p class="text-xs text-gray-600">${a.body}</p>
                                <p class="text-xs text-gray-400 mt-1">${fmtDate(a.time)}</p>
                            </div>
                        `).join('') || '<p class="text-center text-gray-500">No announcements</p>'}
                    </div>
                    <button onclick="closeModal()" class="w-full mt-4 bg-gray-100 text-gray-700 py-2 rounded-lg">Close</button>
                </div>
            `);
        }

        function sendAnnouncement() {
            const title = $('annTitle').value.trim();
            const body = $('annBody').value.trim();
            
            if (!title || !body) { toast('Title and message required', 'error'); return; }
            
            const db = getDB();
            if (!db.global.announcements) db.global.announcements = [];
            db.global.announcements.push({
                id: 'ann_' + Date.now(),
                title, body,
                time: new Date().toISOString()
            });
            saveDB(db);
            
            toast('Announcement sent!', 'success');
            showAdminAnnounce();
        }

        // ===================== INIT =====================
        function init() {
            // Initialize database
            const db = getDB();
            
            // Sync across tabs
            if (window.BroadcastChannel) {
                const bc = new BroadcastChannel('spinwin_sync');
                bc.onmessage = (e) => {
                    if (e.data.type === 'db_update') {
                        if (currentUserId) {
                            const newDb = getDB();
                            if (newDb.users[currentUserId]) {
                                currentUserData = newDb.users[currentUserId];
                                render();
                            }
                        }
                    }
                };
            }
            
            render();
        }

        // Update withdrawal amount display
        document.addEventListener('input', function(e) {
            if (e.target.id === 'wdAmt') {
                const rsEl = $('wdRs');
                if (rsEl) {
                    rsEl.textContent = ((parseInt(e.target.value) || 0) * 0.01).toFixed(2);
                }
            }
        });

        // Start app
        init();
    </script>
</body>
</html>
