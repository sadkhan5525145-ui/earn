<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpinWin - Earn Points, Win Rewards!</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: {
                            50: '#f7fee7',
                            100: '#ecfccb',
                            200: '#d9f99d',
                            300: '#bef264',
                            400: '#a3e635',
                            500: '#84cc16',
                            600: '#65a30d',
                            700: '#4d7c0f',
                            800: '#3f6212',
                            900: '#365314',
                        },
                        olive: {
                            50: '#f6f7f4',
                            100: '#e8ebe3',
                            200: '#d3d9c9',
                            300: '#b5c0a3',
                            400: '#95a47d',
                            500: '#788a5f',
                            600: '#5d6d4a',
                            700: '#49563c',
                            800: '#3d4633',
                            900: '#343c2d',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        * { font-family: 'Inter', sans-serif; }
        
        .wheel-container {
            position: relative;
            width: 320px;
            height: 320px;
        }
        
        .wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(132, 204, 22, 0.3), inset 0 0 20px rgba(0,0,0,0.2);
            transition: transform 4s cubic-bezier(0.17, 0.67, 0.12, 0.99);
        }
        
        .wheel-segment {
            position: absolute;
            width: 50%;
            height: 50%;
            transform-origin: 100% 100%;
            clip-path: polygon(0 0, 100% 0, 100% 100%);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .wheel-segment span {
            position: absolute;
            font-weight: bold;
            font-size: 14px;
            color: white;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
            transform: rotate(22.5deg) translateY(-60px);
        }
        
        .wheel-pointer {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 20px solid transparent;
            border-right: 20px solid transparent;
            border-top: 40px solid #65a30d;
            z-index: 10;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));
        }
        
        .wheel-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #84cc16, #65a30d);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
            font-size: 18px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            z-index: 5;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .wheel-center:hover {
            transform: translate(-50%, -50%) scale(1.1);
        }
        
        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            pointer-events: none;
            animation: confetti-fall 3s linear forwards;
        }
        
        @keyframes confetti-fall {
            0% { transform: translateY(-100vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }
        
        .jackpot-glow {
            animation: jackpot-pulse 1s ease-in-out infinite;
        }
        
        @keyframes jackpot-pulse {
            0%, 100% { box-shadow: 0 0 20px rgba(251, 191, 36, 0.5); }
            50% { box-shadow: 0 0 40px rgba(251, 191, 36, 0.8); }
        }
        
        .slide-up {
            animation: slideUp 0.3s ease-out;
        }
        
        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        
        .online-pulse {
            animation: online-blink 2s infinite;
        }
        
        @keyframes online-blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #65a30d; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #4d7c0f; }
    </style>
</head>
<body class="bg-gray-50 dark:bg-black min-h-screen">
    <div id="app" class="min-h-screen flex flex-col">
        <!-- Header -->
        <header class="bg-white dark:bg-gray-900 shadow-sm sticky top-0 z-40 border-b border-gray-200 dark:border-gray-800">
            <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-gradient-to-br from-primary-400 to-primary-600 rounded-xl flex items-center justify-center">
                        <span class="text-white font-bold text-xl">S</span>
                    </div>
                    <div>
                        <h1 class="text-xl font-bold text-gray-900 dark:text-white">SpinWin</h1>
                        <p class="text-xs text-primary-600 dark:text-primary-400">Earn Points, Win Rewards!</p>
                    </div>
                </div>
                <div class="flex items-center gap-4">
                    <div class="flex items-center gap-2">
                        <span class="online-pulse w-2 h-2 bg-green-500 rounded-full"></span>
                        <span id="onlineCount" class="text-sm text-gray-600 dark:text-gray-400">1 online</span>
                    </div>
                    <button onclick="toggleTheme()" class="p-2 rounded-lg bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-300">
                        <svg id="themeIcon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
                        </svg>
                    </button>
                    <div id="userBadge" class="flex items-center gap-2 bg-primary-50 dark:bg-primary-900/30 px-3 py-1.5 rounded-full">
                        <span class="text-sm font-medium text-primary-700 dark:text-primary-300" id="headerPoints">0</span>
                        <span class="text-xs text-primary-600 dark:text-primary-400">pts</span>
                    </div>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="flex-1 max-w-6xl mx-auto px-4 py-6 w-full">
            <div id="viewContainer"></div>
        </main>

        <!-- Bottom Navigation -->
        <nav class="bg-white dark:bg-gray-900 border-t border-gray-200 dark:border-gray-800 sticky bottom-0">
            <div class="max-w-6xl mx-auto px-4">
                <div class="flex items-center justify-around py-2">
                    <button onclick="showView('home')" class="nav-btn flex flex-col items-center py-2 px-4 text-gray-500 dark:text-gray-400" data-view="home">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
                        </svg>
                        <span class="text-xs mt-1">Home</span>
                    </button>
                    <button onclick="showView('spin')" class="nav-btn flex flex-col items-center py-2 px-4 text-gray-500 dark:text-gray-400" data-view="spin">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
                        </svg>
                        <span class="text-xs mt-1">Spin</span>
                    </button>
                    <button onclick="showView('tasks')" class="nav-btn flex flex-col items-center py-2 px-4 text-gray-500 dark:text-gray-400" data-view="tasks">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/>
                        </svg>
                        <span class="text-xs mt-1">Tasks</span>
                    </button>
                    <button onclick="showView('wallet')" class="nav-btn flex flex-col items-center py-2 px-4 text-gray-500 dark:text-gray-400" data-view="wallet">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"/>
                        </svg>
                        <span class="text-xs mt-1">Wallet</span>
                    </button>
                    <button onclick="showView('profile')" class="nav-btn flex flex-col items-center py-2 px-4 text-gray-500 dark:text-gray-400" data-view="profile">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                        </svg>
                        <span class="text-xs mt-1">Profile</span>
                    </button>
                </div>
            </div>
        </nav>
    </div>

    <!-- Toast Container -->
    <div id="toastContainer" class="fixed top-20 right-4 z-50 flex flex-col gap-2"></div>

    <!-- Modal Container -->
    <div id="modalContainer" class="fixed inset-0 z-50 hidden">
        <div class="absolute inset-0 bg-black/50" onclick="closeModal()"></div>
        <div id="modalContent" class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 bg-white dark:bg-gray-900 rounded-2xl shadow-xl max-w-md w-full mx-4 max-h-[80vh] overflow-y-auto"></div>
    </div>

    <script>
        // ==================== DATA MANAGEMENT ====================
        const DB_KEY = 'spinwin_data';
        const CHANNEL_NAME = 'spinwin_sync';
        
        // BroadcastChannel for cross-tab sync
        const syncChannel = typeof BroadcastChannel !== 'undefined' ? new BroadcastChannel(CHANNEL_NAME) : null;
        
        // Default data structure
        function getDefaultData() {
            return {
                user: {
                    id: 'user_' + Date.now(),
                    name: 'Guest User',
                    email: '',
                    phone: '',
                    points: 100,
                    totalEarned: 100,
                    totalSpins: 0,
                    level: 1,
                    referralCode: 'SPIN' + Math.random().toString(36).substr(2, 6).toUpperCase(),
                    referredBy: null,
                    referrals: [],
                    achievements: [],
                    isAdmin: false,
                    createdAt: new Date().toISOString()
                },
                transactions: [],
                tasks: getDefaultTasks(),
                withdrawals: [],
                announcements: [],
                jackpot: {
                    amount: 10000,
                    lastWon: null,
                    participants: 0
                },
                leaderboards: [],
                settings: {
                    theme: 'light',
                    notifications: true
                }
            };
        }
        
        function getDefaultTasks() {
            return [
                { id: 1, title: 'Daily Login', description: 'Login to SpinWin daily', points: 10, type: 'daily', icon: '👋', completed: false },
                { id: 2, title: 'Watch Video Ad', description: 'Watch a short video advertisement', points: 25, type: 'video', icon: '📺', completed: false },
                { id: 3, title: 'Complete Survey', description: 'Answer a quick survey', points: 50, type: 'survey', icon: '📝', completed: false },
                { id: 4, title: 'Invite Friend', description: 'Refer a friend to SpinWin', points: 100, type: 'referral', icon: '👥', completed: false },
                { id: 5, title: 'Social Share', description: 'Share SpinWin on social media', points: 30, type: 'social', icon: '🔗', completed: false },
                { id: 6, title: 'Play 10 Spins', description: 'Complete 10 spin rounds', points: 75, type: 'achievement', icon: '🎰', completed: false },
                { id: 7, title: 'Download App', description: 'Download our partner app', points: 200, type: 'download', icon: '📱', completed: false },
                { id: 8, title: 'Email Verification', description: 'Verify your email address', points: 150, type: 'verification', icon: '✉️', completed: false }
            ];
        }
        
        // Load data from localStorage
        function loadData() {
            try {
                const stored = localStorage.getItem(DB_KEY);
                if (stored) {
                    const data = JSON.parse(stored);
                    // Merge with defaults to ensure all fields exist
                    return { ...getDefaultData(), ...data, user: { ...getDefaultData().user, ...data.user } };
                }
            } catch (e) {
                console.error('Error loading data:', e);
            }
            return getDefaultData();
        }
        
        // Save data to localStorage
        function saveData(data) {
            try {
                localStorage.setItem(DB_KEY, JSON.stringify(data));
                // Broadcast to other tabs
                if (syncChannel) {
                    syncChannel.postMessage({ type: 'data_update', data: data });
                }
            } catch (e) {
                console.error('Error saving data:', e);
            }
        }
        
        // Initialize app data
        let appData = loadData();
        
        // Listen for updates from other tabs
        if (syncChannel) {
            syncChannel.onmessage = (event) => {
                if (event.data.type === 'data_update') {
                    appData = event.data.data;
                    refreshUI();
                } else if (event.data.type === 'spin_event') {
                    showGlobalNotification(event.data);
                } else if (event.data.type === 'jackpot_alert') {
                    showJackpotAlert(event.data);
                } else if (event.data.type === 'announcement') {
                    showAnnouncement(event.data);
                }
            };
        }
        
        // ==================== THEME MANAGEMENT ====================
        function toggleTheme() {
            const html = document.documentElement;
            const isDark = html.classList.toggle('dark');
            appData.settings.theme = isDark ? 'dark' : 'light';
            saveData(appData);
            updateThemeIcon(isDark);
        }
        
        function updateThemeIcon(isDark) {
            const icon = document.getElementById('themeIcon');
            if (isDark) {
                icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>';
            } else {
                icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>';
            }
        }
        
        // ==================== NAVIGATION ====================
        let currentView = 'home';
        
        function showView(view) {
            currentView = view;
            const container = document.getElementById('viewContainer');
            
            // Update nav buttons
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.remove('text-primary-600', 'dark:text-primary-400');
                btn.classList.add('text-gray-500', 'dark:text-gray-400');
            });
            const activeBtn = document.querySelector(`.nav-btn[data-view="${view}"]`);
            if (activeBtn) {
                activeBtn.classList.remove('text-gray-500', 'dark:text-gray-400');
                activeBtn.classList.add('text-primary-600', 'dark:text-primary-400');
            }
            
            // Render view
            switch (view) {
                case 'home': container.innerHTML = renderHome(); break;
                case 'spin': container.innerHTML = renderSpin(); break;
                case 'tasks': container.innerHTML = renderTasks(); break;
                case 'wallet': container.innerHTML = renderWallet(); break;
                case 'profile': container.innerHTML = renderProfile(); break;
                case 'leaderboard': container.innerHTML = renderLeaderboard(); break;
                case 'admin': container.innerHTML = renderAdmin(); break;
                default: container.innerHTML = renderHome();
            }
        }
        
        // ==================== VIEW RENDERERS ====================
        function renderHome() {
            return `
                <div class="slide-up">
                    <!-- Welcome Card -->
                    <div class="bg-gradient-to-br from-primary-500 to-primary-700 rounded-2xl p-6 text-white mb-6 shadow-lg">
                        <div class="flex items-center justify-between">
                            <div>
                                <h2 class="text-2xl font-bold">Welcome Back!</h2>
                                <p class="text-primary-100 mt-1">${appData.user.name}</p>
                            </div>
                            <div class="text-right">
                                <p class="text-3xl font-bold">${formatNumber(appData.user.points)}</p>
                                <p class="text-primary-200 text-sm">Total Points</p>
                            </div>
                        </div>
                        <div class="mt-4 flex items-center gap-4">
                            <div class="flex items-center gap-2">
                                <div class="w-8 h-8 bg-white/20 rounded-full flex items-center justify-center">
                                    <span class="text-sm font-bold">${appData.user.level}</span>
                                </div>
                                <span class="text-sm">Level</span>
                            </div>
                            <div class="flex items-center gap-2">
                                <div class="w-8 h-8 bg-white/20 rounded-full flex items-center justify-center">
                                    <span class="text-sm font-bold">${appData.user.totalSpins}</span>
                                </div>
                                <span class="text-sm">Spins</span>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Quick Stats -->
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
                        <div class="bg-white dark:bg-gray-800 rounded-xl p-4 shadow-sm border border-gray-100 dark:border-gray-700">
                            <div class="text-2xl mb-2">🎰</div>
                            <p class="text-gray-600 dark:text-gray-400 text-sm">Total Spins</p>
                            <p class="text-xl font-bold text-gray-900 dark:text-white">${appData.user.totalSpins}</p>
                        </div>
                        <div class="bg-white dark:bg-gray-800 rounded-xl p-4 shadow-sm border border-gray-100 dark:border-gray-700">
                            <div class="text-2xl mb-2">💰</div>
                            <p class="text-gray-600 dark:text-gray-400 text-sm">Total Earned</p>
                            <p class="text-xl font-bold text-primary-600">${formatNumber(appData.user.totalEarned)}</p>
                        </div>
                        <div class="bg-white dark:bg-gray-800 rounded-xl p-4 shadow-sm border border-gray-100 dark:border-gray-700">
                            <div class="text-2xl mb-2">👥</div>
                            <p class="text-gray-600 dark:text-gray-400 text-sm">Referrals</p>
                            <p class="text-xl font-bold text-gray-900 dark:text-white">${appData.user.referrals.length}</p>
                        </div>
                        <div class="bg-white dark:bg-gray-800 rounded-xl p-4 shadow-sm border border-gray-100 dark:border-gray-700">
                            <div class="text-2xl mb-2">🏆</div>
                            <p class="text-gray-600 dark:text-gray-400 text-sm">Achievements</p>
                            <p class="text-xl font-bold text-gray-900 dark:text-white">${appData.user.achievements.length}</p>
                        </div>
                    </div>
                    
                    <!-- Jackpot Banner -->
                    <div class="bg-gradient-to-r from-amber-500 to-orange-500 rounded-2xl p-6 mb-6 jackpot-glow">
                        <div class="flex items-center justify-between">
                            <div>
                                <h3 class="text-white font-bold text-xl">🎰 JACKPOT</h3>
                                <p class="text-amber-100">Spin to win big!</p>
                            </div>
                            <div class="text-right">
                                <p class="text-4xl font-bold text-white">${formatNumber(appData.jackpot.amount)}</p>
                                <p class="text-amber-200 text-sm">${appData.jackpot.participants} participants</p>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Quick Actions -->
                    <div class="grid grid-cols-2 gap-4 mb-6">
                        <button onclick="showView('spin')" class="bg-primary-500 hover:bg-primary-600 text-white rounded-xl p-4 flex items-center gap-3 transition-colors">
                            <span class="text-2xl">🎡</span>
                            <div class="text-left">
                                <p class="font-semibold">Spin Now</p>
                                <p class="text-sm text-primary-200">Win points!</p>
                            </div>
                        </button>
                        <button onclick="showView('tasks')" class="bg-white dark:bg-gray-800 hover:bg-gray-50 dark:hover:bg-gray-700 text-gray-900 dark:text-white rounded-xl p-4 flex items-center gap-3 border border-gray-200 dark:border-gray-700 transition-colors">
                            <span class="text-2xl">📋</span>
                            <div class="text-left">
                                <p class="font-semibold">Do Tasks</p>
                                <p class="text-sm text-gray-500">Earn more!</p>
                            </div>
                        </button>
                    </div>
                    
                    <!-- Recent Activity -->
                    <div class="bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-gray-100 dark:border-gray-700">
                        <div class="p-4 border-b border-gray-100 dark:border-gray-700">
                            <h3 class="font-semibold text-gray-900 dark:text-white">Recent Activity</h3>
                        </div>
                        <div class="divide-y divide-gray-100 dark:divide-gray-700 max-h-64 overflow-y-auto">
                            ${appData.transactions.slice(0, 5).map(t => `
                                <div class="p-4 flex items-center justify-between">
                                    <div class="flex items-center gap-3">
                                        <div class="w-10 h-10 rounded-full ${t.type === 'earn' ? 'bg-green-100 dark:bg-green-900/30' : 'bg-red-100 dark:bg-red-900/30'} flex items-center justify-center">
                                            <span class="text-lg">${t.type === 'earn' ? '💰' : '📤'}</span>
                                        </div>
                                        <div>
                                            <p class="font-medium text-gray-900 dark:text-white text-sm">${t.description}</p>
                                            <p class="text-xs text-gray-500">${formatDate(t.timestamp)}</p>
                                        </div>
                                    </div>
                                    <span class="font-semibold ${t.type === 'earn' ? 'text-green-600' : 'text-red-600'}">
                                        ${t.type === 'earn' ? '+' : '-'}${formatNumber(t.amount)}
                                    </span>
                                </div>
                            `).join('') || '<div class="p-4 text-center text-gray-500">No activity yet</div>'}
                        </div>
                    </div>
                </div>
            `;
        }
        
        function renderSpin() {
            return `
                <div class="slide-up">
                    <div class="text-center mb-6">
                        <h2 class="text-2xl font-bold text-gray-900 dark:text-white">Spin the Wheel!</h2>
                        <p class="text-gray-600 dark:text-gray-400">Try your luck and win points</p>
                    </div>
                    
                    <!-- Wheel -->
                    <div class="flex justify-center mb-6">
                        <div class="wheel-container">
                            <div class="wheel-pointer"></div>
                            <div id="wheel" class="wheel">
                                ${renderWheelSegments()}
                            </div>
                            <div class="wheel-center" onclick="spinWheel()">SPIN</div>
                        </div>
                    </div>
                    
                    <!-- Spin Info -->
                    <div class="bg-white dark:bg-gray-800 rounded-xl p-4 shadow-sm border border-gray-100 dark:border-gray-700 mb-6">

            { label: '50', value: 50, color: '#3b82f6', chance: 15 },

        function renderWheelSegments() {
            let html = '';
            const segmentAngle = 360 / wheelPrizes.length;
            
            wheelPrizes.forEach((prize, i) => {
                const rotation = i * segmentAngle;
                html += `
                    <div class="wheel-segment" style="transform: rotate(${rotation}deg); background: ${prize.color};">
                        <span>${prize.label}</span>
                    </div>
                `;
            });
            
            return html;
        }
        
        let isSpinning = false;
        
        function spinWheel() {
            if (isSpinning) return;
            
            if (appData.user.points < 10) {
                showToast('Not enough points! You need 10 points to spin.', 'error');
                return;
            }
            
            isSpinning = true;
            
            // Deduct spin cost
            appData.user.points -= 10;
            appData.user.totalSpins++;
            
            // Determine prize
            const random = Math.random() * 100;
            let cumulative = 0;
            let prize = wheelPrizes[0];
            
            for (const p of wheelPrizes) {
                cumulative += p.chance;
                if (random <= cumulative) {
                    prize = p;
                    break;
                }
            }
            
            // Calculate rotation
            const segmentAngle = 360 / wheelPrizes.length;
            const prizeIndex = wheelPrizes.indexOf(prize);
            const targetRotation = 360 - (prizeIndex * segmentAngle + segmentAngle / 2);
            const totalRotation = 360 * 5 + targetRotation;
            
            const wheel = document.getElementById('wheel');
            wheel.style.transform = `rotate(${totalRotation}deg)`;
            
            // Broadcast spin event
            if (syncChannel) {
                syncChannel.postMessage({
                    type: 'spin_event',
                    user: appData.user.name,
                    prize: prize.label
                });
            }
            
            setTimeout(() => {
                isSpinning = false;
                
                if (prize.value === 'jackpot') {
                    // Jackpot win!
                    const jackpotAmount = appData.jackpot.amount;
                    appData.user.points += jackpotAmount;
                    appData.user.totalEarned += jackpotAmount;
                    appData.jackpot.amount = 10000;
                    
                    addTransaction('earn', jackpotAmount, '🎰 JACKPOT WIN!');
                    showToast(`🎉 JACKPOT! You won ${formatNumber(jackpotAmount)} points!`, 'success');
                    createConfetti();
                    
                    // Broadcast jackpot alert
                    if (syncChannel) {
                        syncChannel.postMessage({
                            type: 'jackpot_alert',
                            user: appData.user.name,
                            amount: jackpotAmount
                        });
                    }
                } else {
                    appData.user.points += prize.value;
                    appData.user.totalEarned += prize.value;
                    addTransaction('earn', prize.value, `Spin win: ${prize.label} points`);
                    showToast(`You won ${prize.value} points!`, 'success');
                    
                    if (prize.value >= 500) {
                        createConfetti();
                    }
                }
                
                // Increase jackpot
                appData.jackpot.amount += 10;
                appData.jackpot.participants++;
                
                // Check for level up
                checkLevelUp();
                
                saveData(appData);
                refreshUI();
            }, 4000);
        }
        
        // ==================== TASKS ====================
        function completeTask(taskId) {
            const task = appData.tasks.find(t => t.id === taskId);
            if (task && !task.completed) {
                task.completed = true;
                appData.user.points += task.points;
                appData.user.totalEarned += task.points;
                addTransaction('earn', task.points, `Task: ${task.title}`);
                
                showToast(`Task completed! +${task.points} points`, 'success');
                saveData(appData);
                refreshUI();
            }
        }
        
        function resetDailyTasks() {
            appData.tasks = getDefaultTasks();
            saveData(appData);
            showToast('Daily tasks reset!', 'success');
            refreshUI();
        }
        
        // ==================== WALLET ====================
        function showWithdrawModal() {
            const modalContent = document.getElementById('modalContent');
            modalContent.innerHTML = `
                <div class="p-6">
                    <h3 class="text-xl font-bold text-gray-900 dark:text-white mb-4">Withdraw Funds</h3>
                    <p class="text-gray-600 dark:text-gray-400 mb-4">Available: ${formatNumber(appData.user.points)} points (min. 1000)</p>
                    
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Amount (points)</label>
                            <input type="number" id="withdrawAmount" min="1000" max="${appData.user.points}" class="w-full p-3 border border-gray-200 dark:border-gray-700 rounded-lg bg-white dark:bg-gray-700 text-gray-900 dark:text-white" placeholder="Enter amount">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Payment Method</label>
                            <select id="withdrawMethod" class="w-full p-3 border border-gray-200 dark:border-gray-700 rounded-lg bg-white dark:bg-gray-700 text-gray-900 dark:text-white">
                                <option value="easypaisa">Easypaisa</option>
                                <option value="jazzcash">JazzCash</option>
                                <option value="bank">Bank Transfer</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Account Number</label>
                            <input type="text" id="withdrawAccount" class="w-full p-3 border border-gray-200 dark:border-gray-700 rounded-lg bg-white dark:bg-gray-700 text-gray-900 dark:text-white" placeholder="Enter account number">
                        </div>
                        <button onclick="submitWithdrawal()" class="w-full bg-primary-500 hover:bg-primary-600 text-white font-semibold py-3 rounded-lg transition-colors">
                            Submit Request
                        </button>
                    </div>
                </div>
            `;
            document.getElementById('modalContainer').classList.remove('hidden');
        }
        
        function submitWithdrawal() {
            const amount = parseInt(document.getElementById('withdrawAmount').value);
            const method = document.getElementById('withdrawMethod').value;
            const account = document.getElementById('withdrawAccount').value;
            
            if (!amount || amount < 1000) {
                showToast('Minimum withdrawal is 1000 points', 'error');
                return;
            }
            
            if (amount > appData.user.points) {
                showToast('Insufficient balance', 'error');
                return;
            }
            
            if (!account) {
                showToast('Please enter account number', 'error');
                return;
            }
            
            // Create withdrawal
            const withdrawal = {
                id: 'wd_' + Date.now(),
                amount: amount,
                method: method,
                account: account,
                status: 'pending',
                timestamp: new Date().toISOString()
            };
            
            appData.withdrawals.push(withdrawal);
            appData.user.points -= amount;
            addTransaction('spend', amount, 'Withdrawal request');
            
            saveData(appData);
            closeModal();
            showToast('Withdrawal request submitted!', 'success');
            refreshUI();
        }
        
        // ==================== ADMIN ====================
        const ADMIN_PASSWORD = 'admin123';
        
        function showAdminLogin() {
            const modalContent = document.getElementById('modalContent');
            modalContent.innerHTML = `
                <div class="p-6">
                    <h3 class="text-xl font-bold text-gray-900 dark:text-white mb-4">Admin Access</h3>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Password</label>
                            <input type="password" id="adminPassword" class="w-full p-3 border border-gray-200 dark:border-gray-700 rounded-lg bg-white dark:bg-gray-700 text-gray-900 dark:text-white" placeholder="Enter admin password">
                        </div>
                        <button onclick="loginAdmin()" class="w-full bg-primary-500 hover:bg-primary-600 text-white font-semibold py-3 rounded-lg transition-colors">
                            Login
                        </button>
                        <p class="text-xs text-gray-500 text-center">Hint: admin123</p>
                    </div>
                </div>
            `;
            document.getElementById('modalContainer').classList.remove('hidden');
        }
        
        function loginAdmin() {
            const password = document.getElementById('adminPassword').value;
            if (password === ADMIN_PASSWORD) {
                appData.user.isAdmin = true;
                saveData(appData);
                closeModal();
                showToast('Admin access granted!', 'success');
                refreshUI();
            } else {
                showToast('Invalid password', 'error');
            }
        }
        
        function adminAddPoints() {
            const amount = prompt('Enter points to add:');
            if (amount && !isNaN(amount)) {
                const pts = parseInt(amount);
                appData.user.points += pts;
                appData.user.totalEarned += pts;
                addTransaction('earn', pts, 'Admin bonus');
                saveData(appData);
                showToast(`Added ${pts} points`, 'success');
                refreshUI();
            }
        }
        
        function adminResetWheel() {
            const wheel = document.getElementById('wheel');
            if (wheel) {
                wheel.style.transition = 'none';
                wheel.style.transform = 'rotate(0deg)';
                setTimeout(() => {
                    wheel.style.transition = 'transform 4s cubic-bezier(0.17, 0.67, 0.12, 0.99)';
                }, 100);
            }
            showToast('Wheel reset!', 'success');
        }
        
        function adminAnnounce() {
            const msg = prompt('Enter announcement:');
            if (msg) {
                if (syncChannel) {
                    syncChannel.postMessage({
                        type: 'announcement',
                        message: msg,
                        timestamp: new Date().toISOString()
                    });
                }
                showToast('Announcement sent!', 'success');
            }
        }
        
        function adminTriggerJackpot() {
            const amount = appData.jackpot.amount;
            appData.user.points += amount;
            appData.user.totalEarned += amount;
            addTransaction('earn', amount, '🎰 Admin triggered JACKPOT!');
            appData.jackpot.amount = 10000;
            
            if (syncChannel) {
                syncChannel.postMessage({
                    type: 'jackpot_alert',
                    user: 'Admin',
                    amount: amount
                });
            }
            
            saveData(appData);
            createConfetti();
            showToast(`Jackpot triggered! Won ${formatNumber(amount)} points!`, 'success');
            refreshUI();
        }
        
        function processWithdrawal(id, status) {
            const withdrawal = appData.withdrawals.find(w => w.id === id);
            if (withdrawal) {
                withdrawal.status = status;
                if (status === 'rejected') {
                    appData.user.points += withdrawal.amount;
                    addTransaction('earn', withdrawal.amount, 'Withdrawal refunded');
                }
                saveData(appData);
                showToast(`Withdrawal ${status}`, 'success');
                refreshUI();
            }
        }
        
        function sendBroadcast() {
            const msg = document.getElementById('broadcastMsg').value;
            if (msg && syncChannel) {
                syncChannel.postMessage({
                    type: 'announcement',
                    message: msg,
                    timestamp: new Date().toISOString()
                });
                showToast('Broadcast sent!', 'success');
            }
        }
        
        // ==================== HELPERS ====================
        function addTransaction(type, amount, description) {
            appData.transactions.unshift({
                id: 'txn_' + Date.now(),
                type: type,
                amount: amount,
                description: description,
                timestamp: new Date().toISOString()
            });
            
            // Keep only last 50 transactions
            if (appData.transactions.length > 50) {
                appData.transactions = appData.transactions.slice(0, 50);
            }
        }
        
        function checkLevelUp() {
            const pointsPerLevel = 1000;
            const newLevel = Math.floor(appData.user.totalEarned / pointsPerLevel) + 1;
            if (newLevel > appData.user.level) {
                appData.user.level = newLevel;
                showToast(`🎉 Level Up! You're now level ${newLevel}!`, 'success');
            }
        }
        
        function formatNumber(num) {
            return new Intl.NumberFormat().format(num);
        }
        
        function formatDate(dateStr) {
            const date = new Date(dateStr);
            return date.toLocaleDateString('en-PK', { 
                month: 'short', 
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        }
        
        function showToast(message, type = 'info') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            
            const bgColor = type === 'success' ? 'bg-green-500' : 
                           type === 'error' ? 'bg-red-500' : 
                           'bg-primary-500';
            
            toast.className = `${bgColor} text-white px-4 py-3 rounded-lg shadow-lg slide-up flex items-center gap-2`;
            toast.innerHTML = `
                <span>${type === 'success' ? '✓' : type === 'error' ? '✕' : 'ℹ'}</span>
                <span>${message}</span>
            `;
            
            container.appendChild(toast);
            
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(100%)';
                toast.style.transition = 'all 0.3s';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }
        
        function closeModal() {
            document.getElementById('modalContainer').classList.add('hidden');
        }
        
        function createConfetti() {
            const colors = ['#84cc16', '#22c55e', '#3b82f6', '#8b5cf6', '#ec4899', '#f59e0b', '#ef4444'];
            
            for (let i = 0; i < 50; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.left = Math.random() * 100 + 'vw';
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.animationDelay = Math.random() * 2 + 's';
                confetti.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
                document.body.appendChild(confetti);
                
                setTimeout(() => confetti.remove(), 5000);
            }
        }
        
        function copyReferralCode() {
            navigator.clipboard.writeText(appData.user.referralCode).then(() => {
                showToast('Referral code copied!', 'success');
            });
        }
        
        function showAchievements() {
            const achievements = [
                { id: 'first_spin', name: 'First Spin', icon: '🎰', description: 'Complete your first spin', unlocked: appData.user.totalSpins > 0 },
                { id: 'spin_10', name: 'Spin Master', icon: '🔄', description: 'Complete 10 spins', unlocked: appData.user.totalSpins >= 10 },
                { id: 'spin_100', name: 'Spin Legend', icon: '⭐', description: 'Complete 100 spins', unlocked: appData.user.totalSpins >= 100 },
                { id: 'points_1000', name: 'Point Collector', icon: '💰', description: 'Earn 1,000 total points', unlocked: appData.user.totalEarned >= 1000 },
                { id: 'points_10000', name: 'Point Millionaire', icon: '💎', description: 'Earn 10,000 total points', unlocked: appData.user.totalEarned >= 10000 },
                { id: 'referral_1', name: 'Networker', icon: '👥', description: 'Refer 1 friend', unlocked: appData.user.referrals.length >= 1 },
                { id: 'level_5', name: 'Rising Star', icon: '🌟', description: 'Reach level 5', unlocked: appData.user.level >= 5 },
                { id: 'level_10', name: 'Champion', icon: '🏆', description: 'Reach level 10', unlocked: appData.user.level >= 10 }
            ];
            
            const modalContent = document.getElementById('modalContent');
            modalContent.innerHTML = `
                <div class="p-6">
                    <h3 class="text-xl font-bold text-gray-900 dark:text-white mb-4">Achievements</h3>
                    <div class="space-y-3 max-h-96 overflow-y-auto">
                        ${achievements.map(a => `
                            <div class="flex items-center gap-3 p-3 rounded-lg ${a.unlocked ? 'bg-primary-50 dark:bg-primary-900/20' : 'bg-gray-50 dark:bg-gray-700 opacity-50'}">
                                <span class="text-2xl">${a.icon}</span>
                                <div>
                                    <p class="font-medium text-gray-900 dark:text-white">${a.name}</p>
                                    <p class="text-sm text-gray-500">${a.description}</p>
                                </div>
                                ${a.unlocked ? '<span class="ml-auto text-green-500">✓</span>' : ''}
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
            document.getElementById('modalContainer').classList.remove('hidden');
        }
        
        function resetApp() {
            if (confirm('Are you sure you want to reset all data? This cannot be undone.')) {
                localStorage.removeItem(DB_KEY);
                appData = getDefaultData();
                saveData(appData);
                showToast('All data reset!', 'success');
                refreshUI();
            }
        }
        
        function showGlobalNotification(data) {
            showToast(`${data.user} won ${data.prize}!`, 'info');
        }
        
        function showJackpotAlert(data) {
            showToast(`🎰 ${data.user} won JACKPOT of ${formatNumber(data.amount)} points!`, 'success');
            createConfetti();
        }
        
        function showAnnouncement(data) {
            const modalContent = document.getElementById('modalContent');
            modalContent.innerHTML = `
                <div class="p-6">
                    <h3 class="text-xl font-bold text-amber-600 mb-4">📢 Announcement</h3>
                    <p class="text-gray-700 dark:text-gray-300">${data.message}</p>
                    <p class="text-xs text-gray-400 mt-2">${formatDate(data.timestamp)}</p>
                    <button onclick="closeModal()" class="mt-4 w-full bg-primary-500 text-white py-2 rounded-lg">Close</button>
                </div>
            `;
            document.getElementById('modalContainer').classList.remove('hidden');
        }
        
        function refreshUI() {
            // Update header points
            const headerPoints = document.getElementById('headerPoints');
            if (headerPoints) {
                headerPoints.textContent = formatNumber(appData.user.points);
            }
            
            // Re-render current view
            showView(currentView);
        }
        
        // ==================== INITIALIZATION ====================
        function init() {
            // Apply theme
            if (appData.settings.theme === 'dark') {
                document.documentElement.classList.add('dark');
                updateThemeIcon(true);
            }
            
            // Show home view
            showView('home');
            
            // Update online count periodically
            let onlineCount = 1;
            setInterval(() => {
                onlineCount = Math.max(1, onlineCount + Math.floor(Math.random() * 3) - 1);
                document.getElementById('onlineCount').textContent = `${onlineCount} online`;
            }, 5000);
        }
        
        // Start the app
        init();
    </script>
</body>
</html>
