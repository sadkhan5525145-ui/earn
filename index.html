    <style>
        * { font-family: 'Inter', sans-serif; }
        
        .wheel-container {
            position: relative;
            width: 300px;
            height: 300px;
        }
        
        @media (min-width: 640px) {
            .wheel-container {
                width: 360px;
                height: 360px;
            }
        }
        
        .wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(132, 204, 22, 0.3), inset 0 0 20px rgba(0,0,0,0.2);
            transition: transform 4s cubic-bezier(0.17, 0.67, 0.12, 0.99);
        }
        
        .wheel-segment {
            position: absolute;
            width: 50%;
            height: 50%;
            transform-origin: 100% 100%;
            clip-path: polygon(0 0, 100% 0, 100% 100%);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .wheel-segment span {
            position: absolute;
            font-weight: bold;
            font-size: 11px;
            color: white;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
            transform: rotate(22.5deg) translateY(-50px);
        }
        
        @media (min-width: 640px) {
            .wheel-segment span {
                font-size: 13px;
                transform: rotate(22.5deg) translateY(-65px);
            }
        }
        
        .wheel-pointer {
            position: absolute;
            top: -12px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 18px solid transparent;
            border-right: 18px solid transparent;
            border-top: 35px solid #65a30d;
            z-index: 10;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));
        }
        
        .wheel-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 65px;
            height: 65px;
            background: linear-gradient(135deg, #84cc16, #65a30d);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
            font-size: 14px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            z-index: 5;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        @media (min-width: 640px) {
            .wheel-center {
                width: 80px;
                height: 80px;
                font-size: 18px;
            }
        }
        
        .wheel-center:hover {
            transform: translate(-50%, -50%) scale(1.1);
        }
        
        .wheel-center:active {
            transform: translate(-50%, -50%) scale(0.95);
        }
        
        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            pointer-events: none;
            animation: confetti-fall 3s linear forwards;
        }
        
        @keyframes confetti-fall {
            0% { transform: translateY(-100vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }
        
        .jackpot-glow {
            animation: jackpot-pulse 1s ease-in-out infinite;
        }
        
        @keyframes jackpot-pulse {
            0%, 100% { box-shadow: 0 0 20px rgba(251, 191, 36, 0.5); }
            50% { box-shadow: 0 0 40px rgba(251, 191, 36, 0.8); }
        }
        
        .slide-up {
            animation: slideUp 0.3s ease-out;
        }
        
        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        
        .fade-in {
            animation: fadeIn 0.3s ease-out;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        .online-pulse {
            animation: online-blink 2s infinite;
        }
        
        @keyframes online-blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .spin-btn-pulse {
            animation: spinPulse 2s infinite;
        }
        
        @keyframes spinPulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(132, 204, 22, 0.4); }
            50% { box-shadow: 0 0 0 12px rgba(132, 204, 22, 0); }
        }
        
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #65a30d; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #4d7c0f; }
        
        .card-hover {
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .card-hover:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
        }
        
        .btn-press:active {
            transform: scale(0.98);
        }
        
        .auth-bg {
            background: linear-gradient(135deg, #84cc16 0%, #65a30d 50%, #4d7c0f 100%);
        }
        
        .glass {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
        }
        
        .dark .glass {
            background: rgba(17, 24, 39, 0.95);
        }
    </style>
</head>

    <script>
        // ==================== CONFIGURATION ====================
        const DB_KEY = 'spinwin_data_v3';
        const CHANNEL_NAME = 'spinwin_sync_v3';
        const VERSION = '3.0.0';
        
        // Admin Configuration
        const ADMIN_EMAIL = 'saadking3132@gmail.com';
        const ADMIN_PASSWORD = 'admin123';
        
        // BroadcastChannel for cross-tab sync
        const syncChannel = typeof BroadcastChannel !== 'undefined' ? new BroadcastChannel(CHANNEL_NAME) : null;
        
        // ==================== DATA STRUCTURES ====================
        function getDefaultData() {
            return {
                version: VERSION,
                currentUser: null,
                users: [],
                settings: {
                    theme: 'light',
                    notifications: true,
                    sound: true
                },
                jackpot: {
                    amount: 10000,
                    lastWon: null,
                    participants: 0
                },
                globalStats: {
                    totalUsers: 0,
                    totalSpins: 0,
                    totalPointsEarned: 0,
                    totalWithdrawals: 0
                },
                announcements: [],
                withdrawalRequests: []
            };
        }
        
        function createNewUser(email, password, name, referralCode = null) {
            const now = new Date().toISOString();
            return {
                id: 'user_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9),
                email: email.toLowerCase(),
                password: password, // In production, this should be hashed
                name: name,
                phone: '',
                points: 100, // Welcome bonus
                totalEarned: 100,
                totalSpins: 0,
                level: 1,
                referralCode: 'SPIN' + Math.random().toString(36).substr(2, 6).toUpperCase(),
                referredBy: referralCode,
                referrals: [],
                achievements: [],
                transactions: [{
                    id: 'txn_' + Date.now(),
                    type: 'earn',
                    amount: 100,
                    description: '🎁 Welcome bonus!',
                    timestamp: now
                }],
                withdrawals: [],
                tasks: getDefaultTasks(),
                stats: {
                    biggestWin: 0,
                    jackpotWins: 0,
                    tasksCompleted: 0
                },
                isAdmin: email.toLowerCase() === ADMIN_EMAIL.toLowerCase(),
                createdAt: now,
                lastLogin: now
            };
        }
        
        function getDefaultTasks() {
            return [
                { id: 1, title: 'Daily Login', description: 'Login to SpinWin daily', points: 10, type: 'daily', icon: '👋', completed: false },
                { id: 2, title: 'Watch Video Ad', description: 'Watch a short video advertisement', points: 25, type: 'video', icon: '📺', completed: false },
                { id: 3, title: 'Complete Survey', description: 'Answer a quick survey', points: 50, type: 'survey', icon: '📝', completed: false },
                { id: 4, title: 'Invite Friend', description: 'Refer a friend to SpinWin', points: 100, type: 'referral', icon: '👥', completed: false },
                { id: 5, title: 'Social Share', description: 'Share SpinWin on social media', points: 30, type: 'social', icon: '🔗', completed: false },
                { id: 6, title: 'Play 10 Spins', description: 'Complete 10 spin rounds', points: 75, type: 'achievement', icon: '🎰', completed: false },
                { id: 7, title: 'Download App', description: 'Download our partner app', points: 200, type: 'download', icon: '📱', completed: false },
                { id: 8, title: 'Email Verification', description: 'Verify your email address', points: 150, type: 'verification', icon: '✉️', completed: false },
                { id: 9, title: 'Profile Complete', description: 'Complete your profile', points: 50, type: 'profile', icon: '👤', completed: false },
                { id: 10, title: 'First Withdrawal', description: 'Make your first withdrawal', points: 100, type: 'milestone', icon: '💳', completed: false }
            ];
        }
        
        // ==================== DATA MANAGEMENT ====================
        let appData = null;
        let currentUser = null;
        
        function loadData() {
            try {
                const stored = localStorage.getItem(DB_KEY);
                if (stored) {
                    const data = JSON.parse(stored);
                    if (data.version !== VERSION) {
                        console.log('Migrating data to version', VERSION);
                        return migrateData(data);
                    }
                    return { ...getDefaultData(), ...data };
                }
            } catch (e) {
                console.error('Error loading data:', e);
            }
            return getDefaultData();
        }
        
        function migrateData(oldData) {
            const newData = getDefaultData();
            // Preserve users and settings
            if (oldData.users) newData.users = oldData.users;
            if (oldData.settings) newData.settings = { ...newData.settings, ...oldData.settings };
            if (oldData.jackpot) newData.jackpot = oldData.jackpot;
            if (oldData.announcements) newData.announcements = oldData.announcements;
            if (oldData.withdrawalRequests) newData.withdrawalRequests = oldData.withdrawalRequests;
            newData.version = VERSION;
            return newData;
        }
        
        function saveData() {
            try {
                localStorage.setItem(DB_KEY, JSON.stringify(appData));
                if (syncChannel) {
                    syncChannel.postMessage({ type: 'data_update', data: appData });
                }
            } catch (e) {
                console.error('Error saving data:', e);
                if (e.name === 'QuotaExceededError') {
                    showToast('Storage full! Please clear some data.', 'error');
                }
            }
        }
        
        function getCurrentUser() {
            if (!appData.currentUser) return null;
            return appData.users.find(u => u.id === appData.currentUser);
        }
        
        function updateCurrentUser(updates) {
            const userIndex = appData.users.findIndex(u => u.id === appData.currentUser);
            if (userIndex !== -1) {
                appData.users[userIndex] = { ...appData.users[userIndex], ...updates };
                currentUser = appData.users[userIndex];
                saveData();
            }
        }
        
        // Listen for updates from other tabs
        if (syncChannel) {
            syncChannel.onmessage = (event) => {
                if (event.data.type === 'data_update') {
                    appData = event.data.data;
                    currentUser = getCurrentUser();
                    if (appData.currentUser) {
                        refreshUI();
                    }
                } else if (event.data.type === 'spin_event') {
                    showGlobalNotification(event.data);
                } else if (event.data.type === 'jackpot_alert') {
                    showJackpotAlert(event.data);
                } else if (event.data.type === 'announcement') {
                    if (currentUser) showAnnouncement(event.data);
                }
            };
        }
        
        // ==================== AUTHENTICATION ====================
        function showAuth() {
            document.getElementById('authContainer').classList.remove('hidden');
            document.getElementById('mainApp').classList.add('hidden');
            renderAuthPage();
        }
        
        function showMainApp() {
            document.getElementById('authContainer').classList.add('hidden');
            document.getElementById('mainApp').classList.remove('hidden');
        }
        
        function renderAuthPage() {
            const container = document.getElementById('authContainer');
            container.innerHTML = `
                <div class="min-h-screen auth-bg flex items-center justify-center p-4">
                    <div class="w-full max-w-md">
                        <div class="text-center mb-8">
                            <div class="w-20 h-20 bg-white rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-xl">
                                <span class="text-primary-600 font-bold text-3xl">S</span>
                            </div>
                            <h1 class="text-3xl font-bold text-white">SpinWin</h1>
                            <p class="text-primary-100 mt-2">Earn Points, Win Rewards!</p>
                        </div>
                        
                        <div class="glass rounded-2xl shadow-xl p-6">
                            <!-- Tabs -->
                            <div class="flex mb-6 bg-gray-100 dark:bg-gray-800 rounded-lg p-1">
                                <button onclick="showAuthTab('login')" id="loginTab" class="flex-1 py-2 px-4 rounded-md text-sm font-medium transition-colors bg-white dark:bg-gray-700 text-gray-900 dark:text-white shadow">
                                    Login
                                </button>
                                <button onclick="showAuthTab('signup')" id="signupTab" class="flex-1 py-2 px-4 rounded-md text-sm font-medium transition-colors text-gray-500 dark:text-gray-400">
                                    Sign Up
                                </button>
                            </div>
                            
                            <!-- Login Form -->
                            <form id="loginForm" onsubmit="handleLogin(event)" class="space-y-4">
                                <div>

        function showAuthTab(tab) {
            const loginForm = document.getElementById('loginForm');
            const signupForm = document.getElementById('signupForm');
            const loginTab = document.getElementById('loginTab');
            const signupTab = document.getElementById('signupTab');
            
            if (tab === 'login') {
                loginForm.classList.remove('hidden');
                signupForm.classList.add('hidden');
                loginTab.classList.add('bg-white', 'dark:bg-gray-700', 'text-gray-900', 'dark:text-white', 'shadow');
                loginTab.classList.remove('text-gray-500', 'dark:text-gray-400');
                signupTab.classList.remove('bg-white', 'dark:bg-gray-700', 'text-gray-900', 'dark:text-white', 'shadow');
                signupTab.classList.add('text-gray-500', 'dark:text-gray-400');
            } else {
                loginForm.classList.add('hidden');
                signupForm.classList.remove('hidden');
                signupTab.classList.add('bg-white', 'dark:bg-gray-700', 'text-gray-900', 'dark:text-white', 'shadow');
                signupTab.classList.remove('text-gray-500', 'dark:text-gray-400');
                loginTab.classList.remove('bg-white', 'dark:bg-gray-700', 'text-gray-900', 'dark:text-white', 'shadow');
                loginTab.classList.add('text-gray-500', 'dark:text-gray-400');
            }
        }
        
        function handleLogin(event) {
            event.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            
            // Check for admin login
            if (email.toLowerCase() === ADMIN_EMAIL.toLowerCase() && password === ADMIN_PASSWORD) {
                // Find or create admin user
                let adminUser = appData.users.find(u => u.email.toLowerCase() === ADMIN_EMAIL.toLowerCase());
                if (!adminUser) {
                    adminUser = createNewUser(ADMIN_EMAIL, ADMIN_PASSWORD, 'Admin');
                    adminUser.isAdmin = true;
                    adminUser.name = 'Saad King (Admin)';
                    adminUser.points = 999999;
                    adminUser.totalEarned = 999999;
                    appData.users.push(adminUser);
                }
                adminUser.lastLogin = new Date().toISOString();
                appData.currentUser = adminUser.id;
                currentUser = adminUser;
                saveData();
                
                showToast('Welcome Admin! 👑', 'success');
                initMainApp();
                return;
            }
            
            // Check regular users
            const user = appData.users.find(u => u.email.toLowerCase() === email.toLowerCase() && u.password === password);
            
            if (user) {
                user.lastLogin = new Date().toISOString();
                appData.currentUser = user.id;
                currentUser = user;
                saveData();
                
                // Check for daily login bonus
                const today = new Date().toDateString();
                const lastLogin = new Date(user.lastLogin).toDateString();
                if (today !== lastLogin) {
                    const dailyTask = user.tasks.find(t => t.id === 1);
                    if (dailyTask && !dailyTask.completed) {
                        dailyTask.completed = true;
                        user.points += dailyTask.points;
                        user.totalEarned += dailyTask.points;
                        user.transactions.unshift({
                            id: 'txn_' + Date.now(),
                            type: 'earn',
                            amount: dailyTask.points,
                            description: '👋 Daily login bonus!',
                            timestamp: new Date().toISOString()
                        });
                        showToast(`Daily login bonus! +${dailyTask.points} points`, 'success');
                    }
                }
                
                showToast(`Welcome back, ${user.name}!`, 'success');
                initMainApp();
            } else {
                showToast('Invalid email or password', 'error');
            }
        }
        
        function handleSignup(event) {
            event.preventDefault();
            const name = document.getElementById('signupName').value;
            const email = document.getElementById('signupEmail').value;
            const password = document.getElementById('signupPassword').value;
            const referralCode = document.getElementById('signupReferral').value;
            
            // Check if email already exists
            if (appData.users.find(u => u.email.toLowerCase() === email.toLowerCase())) {
                showToast('Email already registered. Please login.', 'error');
                showAuthTab('login');
                return;
            }
            
            // Create new user
            const newUser = createNewUser(email, password, name, referralCode || null);
            
            // Handle referral bonus
            if (referralCode) {
                const referrer = appData.users.find(u => u.referralCode === referralCode.toUpperCase());
                if (referrer) {
                    referrer.referrals.push(newUser.id);
                    referrer.points += 100;
                    referrer.totalEarned += 100;
                    referrer.transactions.unshift({
                        id: 'txn_' + Date.now(),
                        type: 'earn',
                        amount: 100,
                        description: `👥 Referral bonus: ${name} joined!`,
                        timestamp: new Date().toISOString()
                    });
                    
                    // Give new user bonus too
                    newUser.points += 50;
                    newUser.totalEarned += 50;
                    newUser.transactions.push({
                        id: 'txn_' + Date.now() + '_ref',
                        type: 'earn',
                        amount: 50,
                        description: '🎁 Referral signup bonus!',
                        timestamp: new Date().toISOString()
                    });
                    
                    showToast('Referral bonus applied! +50 points', 'success');
                } else {
                    showToast('Invalid referral code', 'error');
                }
            }
            
            appData.users.push(newUser);
            appData.currentUser = newUser.id;
            appData.globalStats.totalUsers++;
            currentUser = newUser;
            saveData();
            
            showToast('Account created! Welcome to SpinWin! 🎉', 'success');
            initMainApp();
        }

            { label: '50', value: 50, color: '#3b82f6', chance: 15 },

        function renderWheelSegments() {
            let html = '';
            const segmentAngle = 360 / wheelPrizes.length;
            
            wheelPrizes.forEach((prize, i) => {
                const rotation = i * segmentAngle;
                html += `
                    <div class="wheel-segment" style="transform: rotate(${rotation}deg); background: ${prize.color};">
                        <span>${prize.label}</span>
                    </div>
                `;
            });
            
            return html;
        }
        
        let isSpinning = false;
        
        function spinWheel() {
            if (isSpinning) return;
            
            if (currentUser.points < 10) {
                showToast('Not enough points! You need 10 points to spin.', 'error');
                return;
            }
            
            isSpinning = true;
            
            // Deduct spin cost
            currentUser.points -= 10;
            currentUser.totalSpins++;
            appData.globalStats.totalSpins++;
            
            // Determine prize
            const random = Math.random() * 100;
            let cumulative = 0;
            let prize = wheelPrizes[0];
            
            for (const p of wheelPrizes) {
                cumulative += p.chance;
                if (random <= cumulative) {
                    prize = p;
                    break;
                }
            }
            
            // Calculate rotation
            const segmentAngle = 360 / wheelPrizes.length;
            const prizeIndex = wheelPrizes.indexOf(prize);
            const targetRotation = 360 - (prizeIndex * segmentAngle + segmentAngle / 2);
            const totalRotation = 360 * 5 + targetRotation;
            
            const wheel = document.getElementById('wheel');
            wheel.style.transform = `rotate(${totalRotation}deg)`;
            
            // Broadcast spin event
            if (syncChannel) {
                syncChannel.postMessage({
                    type: 'spin_event',
                    user: currentUser.name,
                    prize: prize.label
                });
            }
            
            setTimeout(() => {
                isSpinning = false;
                
                if (prize.value === 'jackpot') {
                    const jackpotAmount = appData.jackpot.amount;
                    currentUser.points += jackpotAmount;
                    currentUser.totalEarned += jackpotAmount;
                    currentUser.stats.jackpotWins++;
                    appData.jackpot.amount = 10000;
                    
                    addTransaction('earn', jackpotAmount, '🎰 JACKPOT WIN!');
                    showToast(`🎉 JACKPOT! You won ${formatNumber(jackpotAmount)} points!`, 'success');
                    createConfetti();
                    
                    if (jackpotAmount > currentUser.stats.biggestWin) {
                        currentUser.stats.biggestWin = jackpotAmount;
                    }
                    
                    if (syncChannel) {
                        syncChannel.postMessage({
                            type: 'jackpot_alert',
                            user: currentUser.name,
                            amount: jackpotAmount
                        });
                    }
                } else {
                    currentUser.points += prize.value;
                    currentUser.totalEarned += prize.value;
                    addTransaction('earn', prize.value, `Spin win: ${prize.label} points`);
                    showToast(`You won ${prize.value} points!`, 'success');
                    
                    if (prize.value > currentUser.stats.biggestWin) {
                        currentUser.stats.biggestWin = prize.value;
                    }
                    
                    if (prize.value >= 500) {
                        createConfetti();
                    }
                }
                
                appData.jackpot.amount += 10;
                appData.jackpot.participants++;
                
                checkLevelUp();
                checkAchievements();
                updateCurrentUser(currentUser);
                refreshUI();
            }, 4000);
        }
        
        // ==================== TASKS ====================
        function completeTask(taskId) {

            if (task && !task.completed) {

                currentUser.points += task.points;
                currentUser.totalEarned += task.points;
                currentUser.stats.tasksCompleted++;
                addTransaction('earn', task.points, `Task: ${task.title}`);

        function submitWithdrawal() {
            const amount = parseInt(document.getElementById('withdrawAmount').value);
            const method = document.getElementById('withdrawMethod').value;
            const account = document.getElementById('withdrawAccount').value;
            
            if (!amount || amount < 1000) {
                showToast('Minimum withdrawal is 1000 points', 'error');
                return;
            }
            
            if (amount > currentUser.points) {
                showToast('Insufficient balance', 'error');
                return;
            }
            
            if (!account) {
                showToast('Please enter account number', 'error');
                return;
            }
            
            const withdrawal = {
                id: 'wd_' + Date.now(),
                userId: currentUser.id,
                userName: currentUser.name,
                amount: amount,
                method: method,
                account: account,
                status: 'pending',
                timestamp: new Date().toISOString()
            };
            
            appData.withdrawalRequests.push(withdrawal);
            currentUser.withdrawals.push(withdrawal);
            currentUser.points -= amount;
            addTransaction('spend', amount, 'Withdrawal request');
            
            const firstWdTask = currentUser.tasks.find(t => t.id === 10);
            if (firstWdTask && !firstWdTask.completed) {
                firstWdTask.completed = true;
                currentUser.points += firstWdTask.points;
                currentUser.totalEarned += firstWdTask.points;
                addTransaction('earn', firstWdTask.points, `Task: ${firstWdTask.title}`);
            }
            
            updateCurrentUser(currentUser);
            closeModal();
            showToast('Withdrawal request submitted!', 'success');
            refreshUI();
        }

            const email = prompt('Enter user email:');
            if (!email) return;
            
            const user = appData.users.find(u => u.email.toLowerCase() === email.toLowerCase());

                showToast('User not found', 'error');
                return;
            }
            
            const amount = prompt('Enter points to add:');
            if (amount && !isNaN(amount)) {

                    amount: pts,
                    description: '👑 Admin bonus',

                saveData();

        function processWithdrawal(id, status) {
            const withdrawal = appData.withdrawalRequests.find(w => w.id === id);
            if (withdrawal) {
                withdrawal.status = status;
                
                const user = appData.users.find(u => u.id === withdrawal.userId);
                if (user) {
                    const userWithdrawal = user.withdrawals.find(w => w.id === id);
                    if (userWithdrawal) {
                        userWithdrawal.status = status;
                    }
                    
                    if (status === 'completed') {
                        appData.globalStats.totalWithdrawals += withdrawal.amount;
                    } else {
                        user.points += withdrawal.amount;
                        user.transactions.unshift({
                            id: 'txn_' + Date.now(),
                            type: 'earn',
                            amount: withdrawal.amount,
                            description: 'Withdrawal refunded',
                            timestamp: new Date().toISOString()
                        });
                    }
                }
                
                saveData();
                showToast(`Withdrawal ${status}`, status === 'completed' ? 'success' : 'info');
                refreshUI();
            }
        }
        
        function sendBroadcast() {
            const msg = document.getElementById('broadcastMsg').value;
            if (msg && syncChannel) {
                syncChannel.postMessage({
                    type: 'announcement',
                    message: msg,
                    timestamp: new Date().toISOString()
                });
                document.getElementById('broadcastMsg').value = '';
                showToast('Broadcast sent!', 'success');
            }
        }
        
        // ==================== HELPERS ====================
        function addTransaction(type, amount, description) {
            currentUser.transactions.unshift({
                id: 'txn_' + Date.now(),
                type: type,
                amount: amount,
                description: description,
                timestamp: new Date().toISOString()
            });
            
            if (currentUser.transactions.length > 100) {
                currentUser.transactions = currentUser.transactions.slice(0, 100);
            }
        }
        
        function checkLevelUp() {
            const pointsPerLevel = 1000;
            const newLevel = Math.floor(currentUser.totalEarned / pointsPerLevel) + 1;
            if (newLevel > currentUser.level) {
                currentUser.level = newLevel;
                showToast(`🎉 Level Up! You're now level ${newLevel}!`, 'success');
                createConfetti();
            }
        }
        
        function checkAchievements() {
            const achievements = [];
            
            if (currentUser.totalSpins >= 1 && !currentUser.achievements.includes('first_spin')) {
                achievements.push('first_spin');
            }
            if (currentUser.totalSpins >= 10 && !currentUser.achievements.includes('spin_10')) {
                achievements.push('spin_10');
            }
            if (currentUser.totalSpins >= 100 && !currentUser.achievements.includes('spin_100')) {
                achievements.push('spin_100');
            }
            if (currentUser.totalEarned >= 1000 && !currentUser.achievements.includes('points_1000')) {
                achievements.push('points_1000');
            }
            if (currentUser.totalEarned >= 10000 && !currentUser.achievements.includes('points_10000')) {
                achievements.push('points_10000');
            }
            
            if (achievements.length > 0) {
                currentUser.achievements.push(...achievements);
            }
        }
        
        function formatNumber(num) {
            if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
            if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
            return new Intl.NumberFormat().format(num);
        }
        
        function formatDate(dateStr) {
            const date = new Date(dateStr);
            const now = new Date();
            const diff = now - date;
            
            if (diff < 60000) return 'Just now';
            if (diff < 3600000) return Math.floor(diff / 60000) + 'm ago';
            if (diff < 86400000) return Math.floor(diff / 3600000) + 'h ago';
            
            return date.toLocaleDateString('en-PK', { 
                month: 'short', 
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        }
        
        function showToast(message, type = 'info') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            
            const bgColor = type === 'success' ? 'bg-green-500' : 
                           type === 'error' ? 'bg-red-500' : 
                           'bg-primary-500';
            
            const icon = type === 'success' ? '✓' : type === 'error' ? '✕' : 'ℹ';
            
            toast.className = `${bgColor} text-white px-4 py-3 rounded-lg shadow-lg slide-up flex items-center gap-2 min-w-0`;
            toast.innerHTML = `
                <span class="flex-shrink-0">${icon}</span>
                <span class="truncate">${message}</span>
            `;
            
            container.appendChild(toast);
            
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(100%)';
                toast.style.transition = 'all 0.3s';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }
        
        function closeModal() {
            document.getElementById('modalContainer').classList.add('hidden');
        }
        
        function createConfetti() {
            const colors = ['#84cc16', '#22c55e', '#3b82f6', '#8b5cf6', '#ec4899', '#f59e0b', '#ef4444', '#fbbf24'];
            
            for (let i = 0; i < 50; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.left = Math.random() * 100 + 'vw';
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.animationDelay = Math.random() * 2 + 's';
                confetti.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
                confetti.style.width = (Math.random() * 10 + 5) + 'px';
                confetti.style.height = (Math.random() * 10 + 5) + 'px';
                document.body.appendChild(confetti);
                
                setTimeout(() => confetti.remove(), 5000);
            }
        }
        
        function copyReferralCode() {
            navigator.clipboard.writeText(currentUser.referralCode).then(() => {
                showToast('Referral code copied!', 'success');
            }).catch(() => {
                const input = document.createElement('input');
                input.value = currentUser.referralCode;
                document.body.appendChild(input);
                input.select();
                document.execCommand('copy');
                document.body.removeChild(input);
                showToast('Referral code copied!', 'success');
            });
        }

                    <div class="space-y-3 max-h-96 overflow-y-auto">
                        ${achievements.map(a => `
                            <div class="flex items-center gap-3 p-3 rounded-lg ${a.unlocked ? 'bg-primary-50 dark:bg-primary-900/20' : 'bg-gray-50 dark:bg-gray-700 opacity-50'}">
                                <span class="text-2xl">${a.icon}</span>
                                <div class="flex-1">
                                    <p class="font-medium text-gray-900 dark:text-white">${a.name}</p>
                                    <p class="text-sm text-gray-500">${a.description}</p>

            document.getElementById('modalContainer').classList.remove('hidden');

        function showGlobalNotification(data) {
            showToast(`${data.user} won ${data.prize}!`, 'info');
        }

            showToast(`🎰 ${data.user} won JACKPOT of ${formatNumber(data.amount)} points!`, 'success');

        function refreshUI() {
            const headerPoints = document.getElementById('headerPoints');

            showView(currentView);

        // ==================== INITIALIZATION ====================
        function initMainApp() {
            showMainApp();
            
            // Update header points
            document.getElementById('headerPoints').textContent = formatNumber(currentUser.points);
            
            // Show home view
            showView('home');
            
            // Simulate online users
            let onlineCount = Math.floor(Math.random() * 50) + 20;
            const updateOnlineCount = () => {
                onlineCount = Math.max(15, onlineCount + Math.floor(Math.random() * 5) - 2);
                document.getElementById('onlineCount').textContent = `${onlineCount} online`;
            };
            setInterval(updateOnlineCount, 5000);
            
            console.log('SpinWin v' + VERSION + ' loaded for', currentUser.name);
        }
        
        function init() {
            // Load data
            appData = loadData();
            
            // Apply theme
            if (appData.settings.theme === 'dark') {
                document.documentElement.classList.add('dark');
            }
            
            // Check if user is logged in
            if (appData.currentUser) {
                currentUser = getCurrentUser();
                if (currentUser) {
                    initMainApp();
                } else {
                    showAuth();
                }
            } else {
                showAuth();
            }
            
            // Handle keyboard shortcuts
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') {
                    closeModal();
                }
            });
            
            // Handle visibility change
            document.addEventListener('visibilitychange', () => {
                if (document.visibilityState === 'visible') {
                    appData = loadData();
                    currentUser = getCurrentUser();
                    if (currentUser && document.getElementById('mainApp').classList.contains('hidden') === false) {
                        refreshUI();
                    }
                }
            });
            
            console.log('SpinWin v' + VERSION + ' initialized!');
        }
        
        // Start the app
        init();
    </script>
