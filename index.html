<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpinWin - Earn Points, Win Rewards!</title>
    <meta name="description" content="SpinWin - Spin the wheel, complete tasks, and win rewards!">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%236b7a5f' rx='20' width='100' height='100'/><text x='50' y='65' font-size='50' text-anchor='middle' fill='white' font-family='Arial' font-weight='bold'>S</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        olive: {
                            50: '#f4f5f0',
                            100: '#e8ebe3',
                            200: '#d1d7c7',
                            300: '#b3bda3',
                            400: '#95a47d',
                            500: '#7a8a5f',
                            600: '#6b7a5f',
                            700: '#5a6b4a',
                            800: '#4a5a3d',
                            900: '#3d4a32',
                        },
                        accent: { orange: '#FF8C42', orangeHover: '#E67A35' }
                    }
                }
            }
        }
    </script>
    <style>
        * { font-family: 'Inter', sans-serif; }
        .wheel-container { position: relative; width: 280px; height: 280px; }
        @media (min-width: 400px) { .wheel-container { width: 320px; height: 320px; } }
        .wheel { width: 100%; height: 100%; border-radius: 50%; position: relative; overflow: hidden; box-shadow: 0 8px 32px rgba(107, 122, 95, 0.3); transition: transform 4s cubic-bezier(0.17, 0.67, 0.12, 0.99); }
        .wheel-segment { position: absolute; width: 50%; height: 50%; transform-origin: 100% 100%; clip-path: polygon(0 0, 100% 0, 100% 100%); }
        .wheel-segment span { position: absolute; font-weight: 700; font-size: 11px; color: white; text-shadow: 1px 1px 2px rgba(0,0,0,0.4); transform: rotate(22.5deg) translateY(-48px); }
        @media (min-width: 400px) { .wheel-segment span { font-size: 12px; transform: rotate(22.5deg) translateY(-55px); } }
        .wheel-pointer { position: absolute; top: -10px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 16px solid transparent; border-right: 16px solid transparent; border-top: 30px solid #FF8C42; z-index: 10; filter: drop-shadow(0 3px 4px rgba(0,0,0,0.25)); }
        .wheel-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 60px; height: 60px; background: linear-gradient(135deg, #FF8C42, #E67A35); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; color: white; font-size: 14px; box-shadow: 0 4px 12px rgba(255, 140, 66, 0.4); z-index: 5; cursor: pointer; transition: transform 0.15s; }
        .wheel-center:hover { transform: translate(-50%, -50%) scale(1.08); }
        .wheel-center:active { transform: translate(-50%, -50%) scale(0.95); }
        .confetti { position: fixed; width: 10px; height: 10px; pointer-events: none; animation: confetti-fall 3s linear forwards; }
        @keyframes confetti-fall { 0% { transform: translateY(-100vh) rotate(0deg); opacity: 1; } 100% { transform: translateY(100vh) rotate(720deg); opacity: 0; } }
        .slide-up { animation: slideUp 0.25s ease-out; }
        @keyframes slideUp { from { transform: translateY(15px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .online-dot { animation: onlinePulse 1.5s infinite; }
        @keyframes onlinePulse { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.2); opacity: 0.7; } }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #95a47d; border-radius: 3px; }
        .loading-spinner { border: 3px solid #e8ebe3; border-top: 3px solid #6b7a5f; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-olive-50 min-h-screen">
    <div id="app" class="min-h-screen flex items-center justify-center">
        <div class="text-center">
            <div class="loading-spinner mx-auto mb-4"></div>
            <p class="text-olive-600">Loading SpinWin...</p>
        </div>
    </div>
    <div id="toast" class="fixed top-16 right-3 z-50 flex flex-col gap-2 max-w-xs"></div>
    <div id="modal" class="fixed inset-0 z-50 hidden">
        <div class="absolute inset-0 bg-black/40" onclick="closeModal()"></div>
        <div id="modalContent" class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 bg-white rounded-2xl shadow-xl max-w-md w-[90%] max-h-[85vh] overflow-y-auto"></div>
    </div>

    <script>
        // ===================== FIREBASE CONFIG =====================
        // Your Firebase config - Replace with your own or use this demo one
        const firebaseConfig = {
            apiKey: "AIzaSyDemo-Key-For-SpinWin-App-2024",
            authDomain: "spinwin-app-demo.firebaseapp.com",
            databaseURL: "https://spinwin-app-demo-default-rtdb.firebaseio.com",
            projectId: "spinwin-app-demo",
            storageBucket: "spinwin-app-demo.appspot.com",
            messagingSenderId: "123456789",
            appId: "1:123456789:web:abcdef123456"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();

        // ===================== CONFIG =====================
        const ADMIN_EMAIL = 'saadking3132@gmail.com';
        const ADMIN_PASS = 'admin123';
        
        // ===================== STATE =====================
        let currentUser = null;
        let userData = null;
        let globalData = null;
        let currentView = 'home';
        let listeners = {};
        let spinning = false;

        // ===================== WHEEL PRIZES =====================
        const PRIZES = [
            { label: '10', val: 10, color: '#84cc16', chance: 25 },
            { label: '25', val: 25, color: '#22c55e', chance: 20 },
            { label: '50', val: 50, color: '#3b82f6', chance: 15 },
            { label: '100', val: 100, color: '#8b5cf6', chance: 10 },
            { label: '200', val: 200, color: '#ec4899', chance: 7 },
            { label: '500', val: 500, color: '#f59e0b', chance: 5 },
            { label: '1K', val: 1000, color: '#ef4444', chance: 3 },
            { label: 'JP', val: 'jp', color: '#fbbf24', chance: 1 }
        ];

        // ===================== HELPERS =====================
        const $ = id => document.getElementById(id);
        const fmtNum = n => n >= 1000000 ? (n/1000000).toFixed(1)+'M' : n >= 1000 ? (n/1000).toFixed(1)+'K' : n.toLocaleString();
        const fmtDate = d => { const date = new Date(d), now = new Date(), diff = now - date; if(diff < 60000) return 'Just now'; if(diff < 3600000) return Math.floor(diff/60000)+'m ago'; if(diff < 86400000) return Math.floor(diff/3600000)+'h ago'; return date.toLocaleDateString('en-PK', {month:'short', day:'numeric'}); };
        
        function toast(msg, type = 'info') {
            const t = $('toast'), el = document.createElement('div');
            const bg = type === 'success' ? 'bg-green-500' : type === 'error' ? 'bg-red-500' : 'bg-olive-600';
            el.className = `${bg} text-white px-3 py-2 rounded-lg shadow slide-up flex items-center gap-2 text-sm`;
            el.innerHTML = `<span>${type === 'success' ? '✓' : type === 'error' ? '✕' : 'ℹ'}</span><span>${msg}</span>`;
            t.appendChild(el);
            setTimeout(() => { el.style.opacity = '0'; el.style.transform = 'translateX(100%)'; el.style.transition = 'all 0.3s'; setTimeout(() => el.remove(), 300); }, 3000);
        }
        
        function closeModal() { $('modal').classList.add('hidden'); }
        
        function confetti() {
            const colors = ['#84cc16', '#FF8C42', '#3b82f6', '#8b5cf6', '#ec4899', '#f59e0b'];
            for (let i = 0; i < 50; i++) {
                const c = document.createElement('div');
                c.className = 'confetti';
                c.style.left = Math.random() * 100 + 'vw';
                c.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                c.style.animationDelay = Math.random() * 2 + 's';
                c.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
                document.body.appendChild(c);
                setTimeout(() => c.remove(), 5000);
            }
        }

        function getDefaultTasks() {
            return [
                { id: 1, title: 'Daily Login', desc: 'Login daily to SpinWin', pts: 10, icon: '👋', active: true },
                { id: 2, title: 'Watch Video Ad', desc: 'Watch a short video advertisement', pts: 25, icon: '📺', active: true },
                { id: 3, title: 'Complete Survey', desc: 'Answer a quick survey', pts: 50, icon: '📝', active: true },
                { id: 4, title: 'Invite Friend', desc: 'Refer a friend to SpinWin', pts: 100, icon: '👥', active: true },
                { id: 5, title: 'Social Share', desc: 'Share SpinWin on social media', pts: 30, icon: '🔗', active: true },
                { id: 6, title: 'Complete 10 Spins', desc: 'Spin the wheel 10 times', pts: 75, icon: '🎰', active: true },
                { id: 7, title: 'Download Partner App', desc: 'Download our partner app', pts: 200, icon: '📱', active: true },
                { id: 8, title: 'Verify Email', desc: 'Verify your email address', pts: 150, icon: '✉️', active: true },
            ];
        }

        function createUser(email, name, referredBy = null) {
            const refCode = 'SPIN' + Math.random().toString(36).substr(2, 6).toUpperCase();
            return {
                email: email.toLowerCase(),
                name: name,
                phone: '',
                pts: 100,
                totalEarned: 100,
                spins: 0,
                spinsToday: 0,
                lastSpinReset: new Date().toDateString(),
                level: 1,
                refCode: refCode,
                referredBy: referredBy,
                refs: [],
                badges: [],
                txns: [{ id: 't_' + Date.now(), type: 'earn', amt: 100, desc: '🎁 Welcome bonus!', time: new Date().toISOString() }],
                wds: [],
                taskProgress: {},
                stats: { bigWin: 0, jpWins: 0 },
                isAdmin: email.toLowerCase() === ADMIN_EMAIL.toLowerCase(),
                created: new Date().toISOString(),
                lastLogin: new Date().toISOString(),
                online: true,
                lastSeen: firebase.database.ServerValue.TIMESTAMP
            };
        }

        // ===================== DATABASE FUNCTIONS =====================
        function listenToUser(userId) {
            if (listeners.user) listeners.user.off();
            listeners.user = db.ref(`users/${userId}`);
            listeners.user.on('value', snap => {
                userData = snap.val();
                if (userData) {
                    checkDailyReset();
                    render();
                }
            });
        }

        function listenToGlobal() {
            if (listeners.global) listeners.global.off();
            listeners.global = db.ref('global');
            listeners.global.on('value', snap => {
                globalData = snap.val() || {
                    jackpot: { amt: 10000, players: 0 },
                    tasks: getDefaultTasks(),
                    stats: { totalUsers: 0, totalSpins: 0, totalEarned: 0 },
                    announcements: [],
                    onlineUsers: 0
                };
                render();
            });
        }

        function listenToOnlineUsers() {
            if (listeners.online) listeners.online.off();
            listeners.online = db.ref('users').orderByChild('online').equalTo(true);
            listeners.online.on('value', snap => {
                const count = snap.numChildren();
                if (globalData) {
                    globalData.onlineCount = count;
                    render();
                }
            });
        }

        function updateUser(updates) {
            if (currentUser) {
                updates.lastSeen = firebase.database.ServerValue.TIMESTAMP;
                db.ref(`users/${currentUser.uid}`).update(updates);
            }
        }

        function addTransaction(type, amt, desc) {
            const txn = { id: 't_' + Date.now(), type, amt, desc, time: new Date().toISOString() };
            const txns = [...(userData.txns || []), txn].slice(-50);
            updateUser({ txns });
        }

        function checkDailyReset() {
            const today = new Date().toDateString();
            if (userData && userData.lastSpinReset !== today) {
                updateUser({ spinsToday: 0, lastSpinReset: today, taskProgress: {} });
            }
        }

        function checkLevel() {
            const newLvl = Math.floor(userData.totalEarned / 1000) + 1;
            if (newLvl > userData.level) {
                updateUser({ level: newLvl });
                toast(`🎉 Level Up! Now level ${newLvl}!`, 'success');
            }
        }

        // ===================== AUTH =====================
        function initAuth() {
            auth.onAuthStateChanged(async user => {
                if (user) {
                    currentUser = user;
                    const snap = await db.ref(`users/${user.uid}`).once('value');
                    if (snap.exists()) {
                        userData = snap.val();
                        updateUser({ online: true, lastLogin: new Date().toISOString() });
                        listenToUser(user.uid);
                        listenToGlobal();
                        listenToOnlineUsers();
                        
                        // Set offline on disconnect
                        db.ref(`users/${user.uid}/online`).onDisconnect().set(false);
                        db.ref(`users/${user.uid}/lastSeen`).onDisconnect().set(firebase.database.ServerValue.TIMESTAMP);
                    } else {
                        // Create new user
                        const newUser = createUser(user.email, user.email.split('@')[0]);
                        await db.ref(`users/${user.uid}`).set(newUser);
                        userData = newUser;
                        listenToUser(user.uid);
                        listenToGlobal();
                        listenToOnlineUsers();
                        
                        // Increment total users
                        db.ref('global/stats/totalUsers').transaction(c => (c || 0) + 1);
                    }
                } else {
                    currentUser = null;
                    userData = null;
                    if (listeners.user) listeners.user.off();
                    if (listeners.global) listeners.global.off();
                    render();
                }
            });
        }

        async function handleLogin(e) {
            e.preventDefault();
            const email = $('loginEmail').value;
            const pass = $('loginPass').value;
            
            try {
                // Check for admin
                if (email.toLowerCase() === ADMIN_EMAIL.toLowerCase() && pass === ADMIN_PASS) {
                    // Admin login - create custom user
                    let adminSnap = await db.ref('users').orderByChild('email').equalTo(ADMIN_EMAIL.toLowerCase()).once('value');
                    let adminId;
                    
                    if (!adminSnap.exists()) {
                        adminId = 'admin_' + Date.now();
                        const adminUser = createUser(ADMIN_EMAIL, 'Saad King (Admin)');
                        adminUser.isAdmin = true;
                        adminUser.name = 'Saad King (Admin)';
                        adminUser.pts = 999999;
                        adminUser.totalEarned = 999999;
                        await db.ref(`users/${adminId}`).set(adminUser);
                    } else {
                        adminId = Object.keys(adminSnap.val())[0];
                    }
                    
                    // Sign in anonymously and use admin ID
                    await auth.signInAnonymously();
                    currentUser = { uid: adminId, email: ADMIN_EMAIL };
                    const snap = await db.ref(`users/${adminId}`).once('value');
                    userData = snap.val();
                    updateUser({ online: true, lastLogin: new Date().toISOString() });
                    listenToUser(adminId);
                    listenToGlobal();
                    listenToOnlineUsers();
                    db.ref(`users/${adminId}/online`).onDisconnect().set(false);
                    toast('Welcome Admin! 👑', 'success');
                    return;
                }
                
                // Regular user - check if exists in database
                const userSnap = await db.ref('users').orderByChild('email').equalTo(email.toLowerCase()).once('value');
                
                if (userSnap.exists()) {
                    const userId = Object.keys(userSnap.val())[0];
                    const u = Object.values(userSnap.val())[0];
                    
                    // Simple password check (in production, use proper auth)
                    if (u.pass === pass || (u.email.toLowerCase() === email.toLowerCase())) {
                        await auth.signInAnonymously();
                        currentUser = { uid: userId, email: email };
                        userData = u;
                        updateUser({ online: true, lastLogin: new Date().toISOString() });
                        listenToUser(userId);
                        listenToGlobal();
                        listenToOnlineUsers();
                        db.ref(`users/${userId}/online`).onDisconnect().set(false);
                        toast(`Welcome back, ${u.name}!`, 'success');
                    } else {
                        toast('Invalid password', 'error');
                    }
                } else {
                    toast('User not found. Please sign up.', 'error');
                }
            } catch (err) {
                console.error(err);
                toast('Login failed: ' + err.message, 'error');
            }
        }

        async function handleSignup(e) {
            e.preventDefault();
            const name = $('regName').value;
            const email = $('regEmail').value;
            const pass = $('regPass').value;
            const ref = $('regRef').value;
            
            try {
                // Check if email exists
                const snap = await db.ref('users').orderByChild('email').equalTo(email.toLowerCase()).once('value');
                if (snap.exists()) {
                    toast('Email already registered', 'error');
                    return;
                }
                
                await auth.signInAnonymously();
                const newUser = createUser(email, name, ref || null);
                newUser.pass = pass; // Store password (in production, hash it!)
                
                // Handle referral
                if (ref) {
                    const refSnap = await db.ref('users').orderByChild('refCode').equalTo(ref.toUpperCase()).once('value');
                    if (refSnap.exists()) {
                        const refId = Object.keys(refSnap.val())[0];
                        const refUser = Object.values(refSnap.val())[0];
                        
                        // Give referrer bonus
                        db.ref(`users/${refId}`).update({
                            refs: [...(refUser.refs || []), currentUser.uid],
                            pts: (refUser.pts || 0) + 100,
                            totalEarned: (refUser.totalEarned || 0) + 100
                        });
                        
                        // Add referral txn to referrer
                        const refTxns = [...(refUser.txns || []), { id: 't_' + Date.now(), type: 'earn', amt: 100, desc: `👥 Referral: ${name}`, time: new Date().toISOString() }].slice(-50);
                        db.ref(`users/${refId}/txns`).set(refTxns);
                        
                        // Give new user bonus
                        newUser.pts += 50;
                        newUser.totalEarned += 50;
                        newUser.txns.push({ id: 't_' + Date.now() + '_ref', type: 'earn', amt: 50, desc: '🎁 Referral signup bonus!', time: new Date().toISOString() });
                        
                        toast('Referral bonus applied! +50 pts', 'success');
                    }
                }
                
                await db.ref(`users/${currentUser.uid}`).set(newUser);
                userData = newUser;
                
                // Update global stats
                db.ref('global/stats/totalUsers').transaction(c => (c || 0) + 1);
                
                listenToUser(currentUser.uid);
                listenToGlobal();
                listenToOnlineUsers();
                db.ref(`users/${currentUser.uid}/online`).onDisconnect().set(false);
                
                toast('Account created! 🎉', 'success');
            } catch (err) {
                console.error(err);
                toast('Signup failed: ' + err.message, 'error');
            }
        }

        function logout() {
            if (currentUser) {
                db.ref(`users/${currentUser.uid}/online`).set(false);
            }
            auth.signOut();
            toast('Logged out', 'success');
        }

        // ===================== RENDER =====================
        function render() {
            const app = $('app');
            if (!currentUser || !userData) {
                app.innerHTML = renderAuth();
            } else {
                app.innerHTML = renderMain();
            }
        }

        function renderAuth() {
            return `
            <div class="min-h-screen bg-gradient-to-br from-olive-600 to-olive-800 flex items-center justify-center p-4">
                <div class="w-full max-w-md">
                    <div class="text-center mb-6">
                        <div class="w-20 h-20 bg-white rounded-2xl flex items-center justify-center mx-auto mb-3 shadow-lg">
                            <span class="text-4xl">🎰</span>
                        </div>
                        <h1 class="text-3xl font-bold text-white">SpinWin</h1>
                        <p class="text-olive-200 mt-1">Spin. Earn. Withdraw!</p>
                    </div>
                    
                    <div class="bg-white rounded-2xl shadow-xl p-5">
                        <div class="flex mb-4 bg-olive-100 rounded-lg p-1">
                            <button onclick="showAuthTab('login')" id="loginTab" class="flex-1 py-2 px-3 rounded-md text-sm font-medium bg-white text-olive-800 shadow">Login</button>
                            <button onclick="showAuthTab('signup')" id="signupTab" class="flex-1 py-2 px-3 rounded-md text-sm font-medium text-olive-600">Sign Up</button>
                        </div>
                        
                        <form id="loginForm" onsubmit="handleLogin(event)" class="space-y-3">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                                <input type="email" id="loginEmail" required class="w-full p-3 border border-gray-200 rounded-lg focus:ring-2 focus:ring-olive-500 focus:border-transparent" placeholder="your@email.com">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                                <input type="password" id="loginPass" required class="w-full p-3 border border-gray-200 rounded-lg focus:ring-2 focus:ring-olive-500 focus:border-transparent" placeholder="••••••••">
                            </div>
                            <button type="submit" class="w-full bg-olive-600 hover:bg-olive-700 text-white font-semibold py-3 rounded-lg transition">Login</button>
                            <p class="text-xs text-gray-500 text-center">Admin: ${ADMIN_EMAIL} / ${ADMIN_PASS}</p>
                        </form>
                        
                        <form id="signupForm" onsubmit="handleSignup(event)" class="space-y-3 hidden">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Name</label>
                                <input type="text" id="regName" required class="w-full p-3 border border-gray-200 rounded-lg focus:ring-2 focus:ring-olive-500 focus:border-transparent" placeholder="Your Name">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                                <input type="email" id="regEmail" required class="w-full p-3 border border-gray-200 rounded-lg focus:ring-2 focus:ring-olive-500 focus:border-transparent" placeholder="your@email.com">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                                <input type="password" id="regPass" required minlength="6" class="w-full p-3 border border-gray-200 rounded-lg focus:ring-2 focus:ring-olive-500 focus:border-transparent" placeholder="Min 6 characters">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Referral Code (Optional)</label>
                                <input type="text" id="regRef" class="w-full p-3 border border-gray-200 rounded-lg focus:ring-2 focus:ring-olive-500 focus:border-transparent" placeholder="SPINXXXXXX">
                            </div>
                            <button type="submit" class="w-full bg-accent-orange hover:bg-accent-orangeHover text-white font-semibold py-3 rounded-lg transition">Create Account</button>
                        </form>
                    </div>
                </div>
            </div>`;
        }

        function showAuthTab(tab) {
            const lf = $('loginForm'), sf = $('signupForm');
            const lt = $('loginTab'), st = $('signupTab');
            if (tab === 'login') {
                lf.classList.remove('hidden'); sf.classList.add('hidden');
                lt.classList.add('bg-white', 'text-olive-800', 'shadow'); lt.classList.remove('text-olive-600');
                st.classList.remove('bg-white', 'text-olive-800', 'shadow'); st.classList.add('text-olive-600');
            } else {
                lf.classList.add('hidden'); sf.classList.remove('hidden');
                st.classList.add('bg-white', 'text-olive-800', 'shadow'); st.classList.remove('text-olive-600');
                lt.classList.remove('bg-white', 'text-olive-800', 'shadow'); lt.classList.add('text-olive-600');
            }
        }

        function renderMain() {

        async function spinWheel() {
            if (spinning) return;
            
            const today = new Date().toDateString();
            if (userData.lastSpinReset !== today) {
                await updateUser({ spinsToday: 0, lastSpinReset: today });
                userData.spinsToday = 0;
            }
            
            if ((userData.spinsToday || 0) >= 10) {
                toast('No spins left today!', 'error');
                return;
            }
            
            if (userData.pts < 10) {
                toast('Need 10 points to spin!', 'error');
                return;
            }
            
            spinning = true;
            
            // Determine prize
            const rand = Math.random() * 100;
            let cum = 0, prize = PRIZES[0];
            for (const p of PRIZES) {
                cum += p.chance;
                if (rand <= cum) { prize = p; break; }
            }
            
            // Rotation
            const segAngle = 45;
            const idx = PRIZES.indexOf(prize);
            const targetRot = 360 - (idx * segAngle + segAngle / 2);
            const totalRot = 360 * 5 + targetRot;
            
            const wheel = $('wheel');
            wheel.style.transform = `rotate(${totalRot}deg)`;
            
            // Deduct cost immediately
            const newPts = userData.pts - 10;
            const newSpins = (userData.spins || 0) + 1;
            const newSpinsToday = (userData.spinsToday || 0) + 1;
            
            await updateUser({ pts: newPts, spins: newSpins, spinsToday: newSpinsToday });
            
            // Update global spins
            db.ref('global/stats/totalSpins').transaction(c => (c || 0) + 1);
            
            setTimeout(async () => {
                spinning = false;
                
                let winAmt = 0;
                let desc = '';
                
                if (prize.val === 'jp') {
                    // Jackpot!
                    const jpSnap = await db.ref('global/jackpot').once('value');
                    const jp = jpSnap.val() || { amt: 10000 };
                    winAmt = jp.amt;
                    desc = '🎰 JACKPOT WIN!';
                    
                    // Reset jackpot
                    await db.ref('global/jackpot').set({ amt: 10000, players: 0, lastWon: { userId: currentUser.uid, name: userData.name, amt: winAmt, time: new Date().toISOString() } });
                    
                    // Update user
                    const newPts2 = userData.pts + winAmt;
                    const newEarned = userData.totalEarned + winAmt;
                    const txns = [...(userData.txns || []), { id: 't_' + Date.now(), type: 'earn', amt: winAmt, desc, time: new Date().toISOString() }].slice(-50);
                    
                    await updateUser({ pts: newPts2, totalEarned: newEarned, txns, 'stats/jpWins': (userData.stats?.jpWins || 0) + 1 });
                    
                    toast(`🎉 JACKPOT! ${fmtNum(winAmt)} pts!`, 'success');
                    confetti();
                } else {
                    winAmt = prize.val;
                    desc = `Spin: ${prize.label} pts`;
                    
                    const newPts2 = userData.pts + winAmt;
                    const newEarned = userData.totalEarned + winAmt;
                    const txns = [...(userData.txns || []), { id: 't_' + Date.now(), type: 'earn', amt: winAmt, desc, time: new Date().toISOString() }].slice(-50);
                    
                    await updateUser({ pts: newPts2, totalEarned: newEarned, txns });
                    
                    if (winAmt > (userData.stats?.bigWin || 0)) {
                        await updateUser({ 'stats/bigWin': winAmt });
                    }
                    
                    toast(`Won ${winAmt} pts!`, 'success');
                    if (winAmt >= 500) confetti();
                }
                
                // Increase jackpot
                db.ref('global/jackpot/amt').transaction(c => (c || 10000) + 10);
                db.ref('global/jackpot/players').transaction(c => (c || 0) + 1);
                db.ref('global/stats/totalEarned').transaction(c => (c || 0) + winAmt);
                
                render();
            }, 4000);
        }

        async function submitWd() {
            const amt = parseInt($('wdAmt').value);
            const method = $('wdMethod').value;
            const acc = $('wdAcc').value;
            
            if (!amt || amt < 1000) { toast('Minimum 1000 pts', 'error'); return; }
            if (amt > userData.pts) { toast('Insufficient balance', 'error'); return; }
            if (!acc) { toast('Enter account number', 'error'); return; }
            
            const wd = { id: 'wd_' + Date.now(), userId: currentUser.uid, userName: userData.name, userEmail: userData.email, amt, method, acc, status: 'pending', time: new Date().toISOString() };
            
            // Add to user's withdrawals
            const wds = [...(userData.wds || []), wd];
            const newPts = userData.pts - amt;
            const txns = [...(userData.txns || []), { id: 't_' + Date.now(), type: 'spend', amt, desc: 'Withdrawal request', time: new Date().toISOString() }].slice(-50);
            
            await updateUser({ wds, pts: newPts, txns });
            
            // Add to global pending withdrawals
            await db.ref(`withdrawals/${wd.id}`).set(wd);
            
            closeModal();
            toast('Request submitted!', 'success');
            render();
        }

                users.sort((a, b) => (b.totalEarned || 0) - (a.totalEarned || 0));
                
                if ($('usersList')) {
                    $('usersList').innerHTML = users.map(u => `
                        <div class="p-3 flex items-center justify-between">

            // Load withdrawals

                const wds = [];
                snap.forEach(w => wds.push({ id: w.key, ...w.val() }));
                
                if ($('wdList')) {
                    $('wdList').innerHTML = wds.length > 0 ? wds.map(w => `
                        <div class="p-3 flex items-center justify-between">

                                <p class="font-medium text-gray-700">${fmtNum(w.amt)} pts</p>

                                <p class="text-xs text-gray-400">${w.userName} (${w.userEmail})</p>

                                <button onclick="processWd('${w.id}','completed')" class="bg-green-100 hover:bg-green-200 text-green-600 p-1.5 rounded transition">✓</button>

                            </div>
                        </div>
                    `).join('') : '<div class="p-4 text-center text-gray-400">No pending withdrawals</div>';

                    $('pendingWdCount').textContent = wds.length;

                    $('tasksList').innerHTML = tasks.map(t => `
                        <div class="p-3 flex items-center justify-between">

                                <span class="text-xl">${t.icon}</span>
                                <div>

        async function processWd(wdId, status) {
            const wdSnap = await db.ref(`withdrawals/${wdId}`).once('value');
            const wd = wdSnap.val();
            if (!wd) return;
            
            await db.ref(`withdrawals/${wdId}/status`).set(status);
            
            // Find user and update
            if (status === 'rejected') {
                const userSnap = await db.ref('users').orderByChild('email').equalTo(wd.userEmail).once('value');
                if (userSnap.exists()) {
                    const userId = Object.keys(userSnap.val())[0];
                    const u = Object.values(userSnap.val())[0];
                    await db.ref(`users/${userId}`).update({
                        pts: (u.pts || 0) + wd.amt,
                        txns: [...(u.txns || []), { id: 't_' + Date.now(), type: 'earn', amt: wd.amt, desc: 'Withdrawal refunded', time: new Date().toISOString() }].slice(-50)
                    });
                }
            } else {
                // Update user's withdrawal status
                const userSnap = await db.ref('users').orderByChild('email').equalTo(wd.userEmail).once('value');
                if (userSnap.exists()) {
                    const userId = Object.keys(userSnap.val())[0];
                    const u = Object.values(userSnap.val())[0];
                    const wds = (u.wds || []).map(w => w.id === wdId ? { ...w, status } : w);
                    await db.ref(`users/${userId}/wds`).set(wds);
                }
            }
            
            toast(`Withdrawal ${status}`, 'success');
        }

        async function adminAddTask() {
            const title = $('taskTitle').value;
            const desc = $('taskDesc').value;
            const pts = parseInt($('taskPts').value);
            const icon = $('taskIcon').value || '📋';
            
            if (!title || !pts) { toast('Fill required fields', 'error'); return; }
            
            const tasksSnap = await db.ref('global/tasks').once('value');
            const tasks = tasksSnap.val() || getDefaultTasks();
            const newId = Math.max(...tasks.map(t => t.id)) + 1;
            
            tasks.push({ id: newId, title, desc, pts, icon, active: true });
            await db.ref('global/tasks').set(tasks);
            
            closeModal();
            toast('Task added!', 'success');
        }

        async function toggleTask(taskId) {
            const tasksSnap = await db.ref('global/tasks').once('value');
            const tasks = tasksSnap.val() || getDefaultTasks();
            const task = tasks.find(t => t.id === taskId);
            if (task) {
                task.active = !task.active;
                await db.ref('global/tasks').set(tasks);
                toast(`Task ${task.active ? 'enabled' : 'disabled'}`, 'success');
            }
        }
